<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat - Chylnx Hub</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo-small {
            font-weight: 800;
            font-size: 20px;
        }
        .online-info {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
        }
        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .user-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f0f1a;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-own {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-other {
            background: #2d2d44;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        .message-time {
            font-size: 9px;
            margin-top: 4px;
            opacity: 0.6;
            text-align: right;
        }
        .input-area {
            background: #1a1a2e;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2d2d44;
        }
        .message-input {
            flex: 1;
            background: #2d2d44;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .message-input::placeholder {
            color: #888;
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .name-card {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 32px;
            text-align: center;
            max-width: 320px;
        }
        .name-card h3 {
            color: white;
            margin-bottom: 20px;
        }
        .name-card input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #2d2d44;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        .name-card button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
        }
        .system-message {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin: 8px 0;
        }
        .no-access {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .no-access-card {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 32px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_URL = '/api';
        let socket = null;
        let currentUser = null;
        let messages = [];

        // Define ensureAuthenticated directly in this file
        async function ensureAuthenticated() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('chylnx_user', JSON.stringify(user));
                    return user;
                }
                return null;
            } catch (error) {
                console.error('Auth error:', error);
                return null;
            }
        }

        async function getCurrentUser() {
            try {
                const res = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
                if (res.ok) return await res.json();
                return null;
            } catch {
                return null;
            }
        }

        async function setDisplayName(name) {
            try {
                const res = await fetch(`${API_URL}/set-display-name`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ displayName: name })
                });
                return res.ok;
            } catch {
                return false;
            }
        }

        async function init() {
            const user = await ensureAuthenticated();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            
            currentUser = user;
            
            if (!currentUser.paymentVerified && !currentUser.isAdmin) {
                showNoAccess();
                return;
            }
            
            if (!currentUser.displayName) {
                showNameSetup();
            } else {
                startChat();
            }
        }
        
        function showNoAccess() {
            document.getElementById('app').innerHTML = `
                <div class="no-access">
                    <div class="no-access-card">
                        <div style="font-size: 48px;">🔒</div>
                        <h3>Access Required</h3>
                        <p style="margin: 15px 0;">You need to complete payment before accessing the chat.</p>
                        <button onclick="goToPayment()" style="background: #667eea; border: none; padding: 12px 24px; border-radius: 30px; color: white; cursor: pointer;">Go to Payment</button>
                    </div>
                </div>
            `;
        }
        
        function goToPayment() {
            window.location.href = '/payment.html';
        }
        
        function showNameSetup() {
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `
                <div class="name-card">
                    <h3>✨ Choose Your Chat Name</h3>
                    <input type="text" id="displayName" placeholder="Enter unique name..." maxlength="20">
                    <button onclick="saveDisplayName()">Join Chat →</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }
        
        async function saveDisplayName() {
            const name = document.getElementById('displayName').value.trim();
            if (!name || name.length < 2) {
                alert('Name must be at least 2 characters');
                return;
            }
            
            const success = await setDisplayName(name);
            if (success) {
                const overlay = document.querySelector('.overlay');
                if (overlay) overlay.remove();
                currentUser.displayName = name;
                startChat();
            } else {
                alert('Name already taken or invalid');
            }
        }
        
        function startChat() {
            socket = io('/', { withCredentials: true });
            
            socket.on('connect', () => {
                console.log('Socket connected');
                socket.emit('join_chat');
            });
            
            socket.on('chat_history', (data) => {
                messages = data.messages || [];
                renderChat();
            });
            
            socket.on('new_message', (msg) => {
                messages.push(msg);
                renderChat();
            });
            
            socket.on('admin_broadcast', (data) => {
                messages.push({
                    id: Date.now(),
                    sender: '📢 ANNOUNCEMENT',
                    text: data.message,
                    timestamp: new Date().toISOString(),
                    isSystem: true
                });
                renderChat();
            });
            
            socket.on('online_count', (data) => {
                const span = document.getElementById('onlineCount');
                if (span) span.innerText = data.count;
            });
            
            socket.on('error', (data) => {
                console.error('Socket error:', data);
                if (data.message === 'Payment required') {
                    alert('Payment required to chat');
                    window.location.href = '/payment.html';
                }
            });
            
            renderChat();
        }
        
        function renderChat() {
            const displayName = currentUser.displayName || (currentUser.fullName ? currentUser.fullName.split(' ')[0] : 'User');
            
            const html = `
                <div class="chat-header">
                    <div class="logo-small">💬 chylnx hub</div>
                    <div class="online-info">
                        <span class="online-dot"></span>
                        <span id="onlineCount">1</span> online
                    </div>
                    <div class="user-badge">
                        👤 ${escapeHtml(displayName)}
                        <button onclick="logout()" style="background: none; border: none; color: white; cursor: pointer; font-size: 14px;">🚪</button>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    ${messages.map(msg => renderMessage(msg, displayName)).join('')}
                </div>
                <div class="input-area">
                    <input type="text" class="message-input" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">📤</button>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
            scrollToBottom();
            const input = document.getElementById('messageInput');
            if (input) input.focus();
        }
        
        function renderMessage(msg, currentName) {
            if (msg.isSystem) {
                return `<div class="system-message">📢 ${escapeHtml(msg.text)}</div>`;
            }
            const isOwn = msg.sender === currentName;
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            return `
                <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                    <div class="message-sender">${escapeHtml(msg.sender)}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text || !socket) return;
            socket.emit('send_message', { text });
            input.value = '';
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
        
        function scrollToBottom() {
            setTimeout(() => {
                const container = document.getElementById('messagesContainer');
                if (container) {
                    container.scrollTop = container.scrollHeight;
                }
            }, 100);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
            localStorage.clear();
            window.location.href = '/login.html';
        }
        
        // Start the app
        init();
    </script>
</body>
</html>
