<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat - Chylnx Hub</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;height:100vh;display:flex;flex-direction:column}
        .chat-header{background:#075E54;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
        .chat-header-left{display:flex;align-items:center;gap:12px}
        .chat-name{font-weight:600;font-size:16px}
        .online-status{font-size:12px;opacity:.8}
        .header-actions button{background:0;border:0;color:#fff;font-size:20px;cursor:pointer}
        .messages-container{flex:1;overflow-y:auto;padding:16px;background:#0f0f1a;display:flex;flex-direction:column;gap:8px}
        .message{max-width:75%;padding:8px 12px;border-radius:12px;word-wrap:break-word}
        .message-own{background:#075E54;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
        .message-other{background:#262d31;color:#e9e9e9;align-self:flex-start;border-bottom-left-radius:4px}
        .system-message{text-align:center;font-size:12px;color:#888;margin:8px 0}
        .message-sender{font-size:11px;font-weight:600;margin-bottom:4px;opacity:.8}
        .message-text{font-size:14px;line-height:1.4}
        .message-time{font-size:10px;opacity:.6;text-align:right;margin-top:4px}
        .input-area{background:#1e2a32;padding:10px 16px;display:flex;gap:12px;align-items:center}
        .message-input{flex:1;background:#2a3b44;border:0;padding:10px 16px;border-radius:25px;color:#fff;font-size:15px;outline:0}
        .message-input::placeholder{color:#8696a0}
        .send-btn{background:#075E54;border:0;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:20px;color:#fff;display:flex;align-items:center;justify-content:center}
        .send-btn:disabled{opacity:.5}
        .typing-indicator{padding:8px 16px;font-size:12px;color:#8696a0;font-style:italic}
        .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:1000}
        .name-card{background:#1a1a2e;padding:30px;border-radius:24px;text-align:center;max-width:320px;width:90%}
        .name-card h3{color:#fff;margin-bottom:20px}
        .name-card input{width:100%;padding:14px;border-radius:30px;border:0;background:#2d2d44;color:#fff;font-size:16px;margin-bottom:15px;outline:0}
        .name-card button{background:#075E54;color:#fff;border:0;padding:12px;border-radius:30px;cursor:pointer;width:100%}
        .no-access{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;background:#0f0f1a}
        .no-access-card{background:#1a1a2e;padding:30px;border-radius:24px;color:#fff;max-width:300px}
        .online-dot{display:inline-block;width:8px;height:8px;background:#25D366;border-radius:50%;margin-right:6px}
        .loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;color:#fff;display:none}
    </style>
</head>
<body>
    <div id="loading" class="loading"><div>Connecting... ⏳</div></div>
    <div id="app"></div>

    <script>
        const API_URL = '/api';
        let socket = null, currentUser = null, messages = [], typingTimeout = null;

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        
        async function getUser() {
            try {
                const res = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
                if (res.ok) return await res.json();
                return null;
            } catch { return null; }
        }

        async function setDisplayName(name) {
            try {
                const res = await fetch(`${API_URL}/set-display-name`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', body: JSON.stringify({ displayName: name })
                });
                return res.ok;
            } catch { return false; }
        }

        async function init() {
            showLoading(true);
            currentUser = await getUser();
            if (!currentUser) { window.location.href = '/login.html'; return; }
            if (!currentUser.paymentVerified && !currentUser.isAdmin) { showNoAccess(); showLoading(false); return; }
            if (!currentUser.displayName) { showNameSetup(); showLoading(false); return; }
            startChat();
            showLoading(false);
        }
        
        function showNoAccess() {
            document.getElementById('app').innerHTML = `<div class="no-access"><div class="no-access-card"><div style="font-size:48px">🔒</div><h3>Access Required</h3><p>Complete payment to access chat.</p><button onclick="window.location.href='/payment.html'" style="background:#075E54;border:0;padding:12px 24px;border-radius:30px;color:#fff;margin-top:15px;cursor:pointer">Go to Payment</button></div></div>`;
        }
        
        function showNameSetup() {
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.innerHTML = `<div class="name-card"><h3>✨ Choose Your Name</h3><input type="text" id="displayName" placeholder="Enter name..." maxlength="20"><button onclick="saveDisplayName()">Continue →</button></div>`;
            document.body.appendChild(overlay);
            document.getElementById('displayName')?.focus();
        }
        
        async function saveDisplayName() {
            const name = document.getElementById('displayName').value.trim();
            if (!name || name.length < 2) { alert('Name must be at least 2 characters'); return; }
            const success = await setDisplayName(name);
            if (success) {
                document.querySelector('.overlay').remove();
                currentUser.displayName = name;
                startChat();
            } else { alert('Name already taken'); }
        }
        
        function startChat() {
            const displayName = currentUser.displayName || currentUser.fullName?.split(' ')[0] || 'User';
            document.getElementById('app').innerHTML = `
                <div class="chat-header"><div class="chat-header-left"><div class="chat-info"><div class="chat-name">Chylnx Hub</div><div class="online-status"><span class="online-dot"></span><span id="onlineCount">0</span> online</div></div></div><div class="header-actions"><button onclick="logout()">🚪</button></div></div>
                <div class="messages-container" id="messagesContainer"><div style="text-align:center;color:#666;padding:50px">Connecting...</div></div>
                <div id="typingIndicator" class="typing-indicator"></div>
                <div class="input-area"><input type="text" class="message-input" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)" onkeyup="handleTyping()"><button class="send-btn" onclick="sendMessage()">📤</button></div>`;
            
            socket = io('/', { withCredentials: true, transports: ['websocket', 'polling'] });
            socket.on('connect', () => { console.log('Connected'); socket.emit('join_chat'); });
            socket.on('chat_history', (data) => { messages = data.messages || []; renderMessages(); });
            socket.on('new_message', (msg) => { messages.push(msg); renderMessages(); });
            socket.on('online_count', (data) => { const span = document.getElementById('onlineCount'); if(span) span.innerText = data.count; });
            socket.on('user_typing', (data) => { const ind = document.getElementById('typingIndicator'); if(ind) ind.innerText = data.isTyping ? `✏️ ${data.user} is typing...` : ''; });
            socket.on('error', (data) => { if(data.message === 'Payment required') alert('Payment required'); });
        }
        
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            const currentName = currentUser.displayName || currentUser.fullName?.split(' ')[0] || 'User';
            if (messages.length === 0) { container.innerHTML = '<div style="text-align:center;color:#666;padding:50px">No messages yet. Start chatting! 💬</div>'; return; }
            
            let lastDate = null, html = '';
            messages.forEach(msg => {
                const msgDate = new Date(msg.timestamp);
                const dateKey = msgDate.toDateString();
                if (lastDate !== dateKey) {
                    lastDate = dateKey;
                    const isToday = dateKey === new Date().toDateString();
                    html += `<div style="text-align:center;margin:16px 0"><span style="background:#2a3b44;padding:4px 12px;border-radius:20px;font-size:11px;color:#ccc">${isToday ? 'Today' : msgDate.toLocaleDateString()}</span></div>`;
                }
                const time = msgDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (msg.isSystem) html += `<div class="system-message">📢 ${escapeHtml(msg.text)}</div>`;
                else {
                    const isOwn = msg.sender === currentName;
                    html += `<div class="message ${isOwn ? 'message-own' : 'message-other'}">${!isOwn ? `<div class="message-sender">${escapeHtml(msg.sender)}</div>` : ''}<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${time}</div></div>`;
                }
            });
            container.innerHTML = html;
            setTimeout(() => container.scrollTop = container.scrollHeight, 50);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text || !socket) return;
            socket.emit('send_message', { text });
            input.value = '';
            if (typingTimeout) clearTimeout(typingTimeout);
            socket.emit('typing', { isTyping: false });
        }
        
        function handleKeyPress(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function handleTyping() {
            if (!socket) return;
            socket.emit('typing', { isTyping: true });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => socket.emit('typing', { isTyping: false }), 1000);
        }
        
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        async function logout() { await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' }); localStorage.clear(); window.location.href = '/login.html'; }
        init();
    </script>
</body>
</html>
