<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chylnx Hub - Login</title>
    <style>
        :root {
            --green-dark: #0a3d0a;
            --green-mid: #1a5c1a;
            --green-light: #2d8a2d;
            --green-bright: #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0a3d0a 0%, #1a5c1a 30%, #0d4a0d 60%, #0a3d0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            position: relative;
            z-index: 10;
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #1a5c1a, #2d8a2d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .logo-subtitle { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 30px; }

        .form-group { margin-bottom: 18px; position: relative; }

        .form-group .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #9ca3af;
            pointer-events: none;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #f9fafb;
            color: #1f2937;
        }

        input:focus { border-color: #4caf50; background: #fff; box-shadow: 0 0 0 4px rgba(76,175,80,0.1); }
        input::placeholder { color: #9ca3af; }

        button {
            width: 100%;
            background: linear-gradient(135deg, #2d8a2d, #4caf50);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(76,175,80,0.4); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.5);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 3px solid #dc2626;
            display: none;
        }

        .success {
            background: #f0fdf4;
            color: #166534;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 3px solid #22c55e;
            display: none;
        }

        .switch { text-align: center; margin-top: 20px; color: #6b7280; font-size: 14px; }

        .switch a {
            color: #2d8a2d;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .switch a:hover { color: #1a5c1a; text-decoration: underline; }

        .admin-note {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .admin-note span { color: #4caf50; font-weight: 600; }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; border-radius: 24px; }
            .logo { font-size: 26px; }
            input { font-size: 14px; padding: 12px 12px 12px 40px; }
            button { padding: 13px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎮 chylnx hub</div>
        <div class="logo-subtitle">Welcome back! Sign in to continue</div>
        
        <div id="errorDiv" class="error"></div>
        <div id="successDiv" class="success"></div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <span class="icon">📧</span>
                <input type="email" id="email" placeholder="Email address" autocomplete="email">
            </div>
            <div class="form-group">
                <span class="icon">🔒</span>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            </div>
            <button id="loginBtn" onclick="handleLogin()">Sign In →</button>
            <div class="switch">
                Don't have an account? <a onclick="showSignup()">Create one</a>
            </div>
        </div>
        
        <!-- Signup Form -->
        <div id="signupForm" style="display: none;">
            <div class="form-group">
                <span class="icon">👤</span>
                <input type="text" id="fullName" placeholder="Full name" autocomplete="name">
            </div>
            <div class="form-group">
                <span class="icon">📧</span>
                <input type="email" id="signupEmail" placeholder="Email address" autocomplete="email">
            </div>
            <div class="form-group">
                <span class="icon">🔒</span>
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" autocomplete="new-password">
            </div>
            <button id="signupBtn" onclick="handleSignup()">Create Account →</button>
            <div class="switch">
                Already have an account? <a onclick="showLogin()">Sign in</a>
            </div>
        </div>
        
        <div class="admin-note">
            👑 Admin: <span>admin@chylnx.com</span> / <span>admin123</span>
        </div>
    </div>

    <script>
        function showError(msg) {
            document.getElementById('errorDiv').textContent = msg;
            document.getElementById('errorDiv').style.display = 'block';
            document.getElementById('successDiv').style.display = 'none';
            setTimeout(function() {
                document.getElementById('errorDiv').style.display = 'none';
            }, 5000);
        }

        function showSuccess(msg) {
            document.getElementById('successDiv').textContent = msg;
            document.getElementById('successDiv').style.display = 'block';
            document.getElementById('errorDiv').style.display = 'none';
            setTimeout(function() {
                document.getElementById('successDiv').style.display = 'none';
            }, 5000);
        }

        function showLoading(btnId, show) {
            var btn = document.getElementById(btnId);
            if (show) {
                btn.disabled = true;
                btn.innerHTML = 'Please wait... <span class="loader"></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? 'Sign In →' : 'Create Account →';
            }
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('errorDiv').style.display = 'none';
            document.getElementById('successDiv').style.display = 'none';
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('errorDiv').style.display = 'none';
            document.getElementById('successDiv').style.display = 'none';
        }

       async function handleLogin() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    
    if (!email || !password) {
        showError('Please enter both email and password');
        return;
    }
    
    showLoading('loginBtn', true);
    
    try {
        var res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email: email, password: password, rememberMe: true })
        });
        
        var data = await res.json();
        
        if (res.ok) {
            // ✅ Save user to localStorage
            localStorage.setItem('chylnx_user', JSON.stringify(data.user));
            
            showSuccess('✅ Login successful! Redirecting...');
            setTimeout(function() {
                if (data.user.isAdmin) {
                    window.location.href = '/admin_dashboard.html';
                } else {
                    window.location.href = '/index.html';
                }
            }, 500);
        } else {
            showError(data.error || 'Invalid email or password');
            showLoading('loginBtn', false);
            document.getElementById('password').value = '';
        }
    } catch (err) {
        showError('Cannot connect to server. Please check your connection.');
        showLoading('loginBtn', false);
    }
}

        async function handleSignup() {
            var fullName = document.getElementById('fullName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;
            
            if (!fullName || !email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            showLoading('signupBtn', true);
            
            try {
                var res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        fullName: fullName, 
                        email: email, 
                        password: password 
                    })
                });
                
                var data = await res.json();
                
                if (res.ok) {
                    showSuccess('✅ Account created! You can now sign in.');
                    setTimeout(function() {
                        showLogin();
                        document.getElementById('email').value = email;
                    }, 1000);
                    
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('signupPassword').value = '';
                    document.getElementById('fullName').value = '';
                } else {
                    showError(data.error || 'Registration failed. Please try again.');
                }
            } catch (err) {
                showError('Cannot connect to server. Please try again.');
            } finally {
                showLoading('signupBtn', false);
            }
        }

        // Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (document.getElementById('loginForm').style.display !== 'none') {
                    handleLogin();
                } else {
                    handleSignup();
                }
            }
        });

        window.showLogin = showLogin;
        window.showSignup = showSignup;
    </script>
</body>
</html>
