<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chylnx Hub - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            position: relative;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .switch {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }
        .switch a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
        }
        .admin-note {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .remember-me input {
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">chylnx hub</div>
        
        <div id="errorDiv" class="error" style="display: none;"></div>
        
        <div id="loginForm">
            <input type="email" id="email" placeholder="Email address" autocomplete="email">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label>Remember me</label>
            </div>
            <button id="loginBtn" onclick="login()">Sign In →</button>
            <div class="switch">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
        </div>
        
        <div id="signupForm" style="display: none;">
            <input type="text" id="fullName" placeholder="Full name">
            <input type="email" id="signupEmail" placeholder="Email address">
            <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
            <button id="signupBtn" onclick="signup()">Create Account →</button>
            <div class="switch">Already have an account? <a onclick="showLogin()">Sign in</a></div>
        </div>
        
        <div class="admin-note">👑 Admin: admin@chylnx.com / admin123</div>
    </div>

    <script>
        function showError(msg) {
            const div = document.getElementById('errorDiv');
            div.innerText = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }

        function showLoading(buttonId, show) {
            const btn = document.getElementById(buttonId);
            if (show) {
                btn.disabled = true;
                btn.innerHTML = 'Please wait... <span class="loader"></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = buttonId === 'loginBtn' ? 'Sign In →' : 'Create Account →';
            }
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('errorDiv').style.display = 'none';
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('errorDiv').style.display = 'none';
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }
            
            showLoading('loginBtn', true);
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password, rememberMe })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('chylnx_user', JSON.stringify(data.user));
                    if (rememberMe) {
                        localStorage.setItem('remember_me', 'true');
                    }
                    
                    if (data.user.isAdmin) {
                        window.location.href = '/admin_dashboard.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                } else {
                    showError(data.error || 'Login failed');
                    showLoading('loginBtn', false);
                }
            } catch (err) {
                showError('Cannot connect to server. Please try again.');
                showLoading('loginBtn', false);
            }
        }

        async function signup() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            if (!fullName || !email || !password) {
                showError('Please fill all fields');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            showLoading('signupBtn', true);
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    alert('Account created! Please sign in.');
                    showLogin();
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('signupPassword').value = '';
                    document.getElementById('fullName').value = '';
                } else {
                    showError(data.error || 'Signup failed');
                }
            } catch (err) {
                showError('Cannot connect to server');
            } finally {
                showLoading('signupBtn', false);
            }
        }
    </script>
</body>
</html>
