<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chylnx Hub</title>
    <style>
        :root {
            --green-dark: #0a3d0a;
            --green-mid: #1a5c1a;
            --green-light: #2d8a2d;
            --green-bright: #4caf50;
            --green-glow: #8bc34a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0a3d0a 0%, #1a5c1a 30%, #0d4a0d 60%, #0a3d0a 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Falling objects container */
        .falling-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .falling-object {
            position: absolute;
            top: -60px;
            animation: fall linear infinite;
            opacity: 0.15;
            filter: blur(0.5px);
            will-change: transform;
        }

        /* Chess pieces */
        .chess-piece {
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Planets */
        .planet {
            border-radius: 50%;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.2);
        }

        /* Books */
        .book {
            font-size: 24px;
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(139,195,74,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-60px) rotate(0deg) translateX(0px);
                opacity: 0;
            }
            5% {
                opacity: 0.2;
            }
            90% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(105vh) rotate(720deg) translateX(80px);
                opacity: 0;
            }
        }

        @keyframes fallSlow {
            0% {
                transform: translateY(-60px) rotate(0deg) translateX(0px);
                opacity: 0;
            }
            5% {
                opacity: 0.15;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg) translateX(-60px);
                opacity: 0;
            }
        }

        @keyframes fallFast {
            0% {
                transform: translateY(-60px) rotate(0deg) translateX(0px);
                opacity: 0;
            }
            5% {
                opacity: 0.25;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(105vh) rotate(900deg) translateX(100px);
                opacity: 0;
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        @keyframes swayChess {
            0%, 100% { transform: translateX(0px); }
            25% { transform: translateX(15px); }
            75% { transform: translateX(-15px); }
        }

        @keyframes swayPlanet {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(25px); }
        }

        @keyframes swayBook {
            0%, 100% { transform: translateX(0px); }
            33% { transform: translateX(-10px); }
            66% { transform: translateX(20px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(76,175,80,0.3); }
            50% { box-shadow: 0 0 40px rgba(139,195,74,0.5); }
        }

        /* Main container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.35), 0 0 60px rgba(76,175,80,0.2);
            backdrop-filter: blur(10px);
            animation: glow 4s ease-in-out infinite;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header {
            background: linear-gradient(135deg, #1a5c1a, #2d8a2d, #1a5c1a);
            padding: 30px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .logo-subtitle {
            font-size: 14px;
            position: relative;
            z-index: 1;
            opacity: 0.9;
            margin-top: 5px;
        }

        .content {
            padding: 30px;
        }

        .user-info {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(76,175,80,0.2);
        }

        .user-name-display {
            color: #0a3d0a;
            font-weight: 500;
        }

        .logout {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .logout:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .timers-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .timer-card {
            background: linear-gradient(135deg, #0a3d0a, #1a5c1a);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            color: #fff;
            border: 1px solid rgba(139,195,74,0.3);
            transition: transform 0.2s ease;
        }

        .timer-card:hover {
            transform: translateY(-2px);
        }

        .timer-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .timer-display {
            font-size: 32px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(139,195,74,0.5);
        }

        .info-bar {
            background: linear-gradient(135deg, #2d8a2d, #4caf50);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(76,175,80,0.3); }
            50% { box-shadow: 0 0 25px rgba(139,195,74,0.5); }
        }

        .chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #2d8a2d, #4caf50);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76,175,80,0.4);
        }

        .chat-btn:active {
            transform: scale(0.98);
        }

        .chat-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .chat-btn:hover::after {
            opacity: 1;
        }

        .admin-btn {
            background: linear-gradient(135deg, #c62828, #ef4444) !important;
        }

        .admin-btn:hover {
            box-shadow: 0 10px 30px rgba(239,68,68,0.4) !important;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
            background: rgba(255,255,255,0.5);
        }

        /* Loading overlay */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,61,10,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #fff;
            font-size: 18px;
            gap: 20px;
        }

        .loading.hide {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #4caf50;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .timers-section {
                grid-template-columns: 1fr;
            }
            
            .timer-display {
                font-size: 24px;
            }
            
            .logo {
                font-size: 28px;
            }
            
            .card {
                border-radius: 30px;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Falling Objects Container -->
    <div class="falling-objects" id="fallingObjects"></div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <div>Loading your hub... ⏳</div>
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">🎮 chylnx hub</div>
                <div class="logo-subtitle">Connect • Chat • Play</div>
            </div>
            <div class="content">
                <div class="user-info">
                    <span class="user-name-display" id="userName">Loading...</span>
                    <button class="logout" onclick="logout()">🚪 Logout</button>
                </div>
                <div class="timers-section">
                    <div class="timer-card">
                        <div class="timer-title">🎯 GAME TIMER</div>
                        <div class="timer-display" id="gameTimer">--:--:--</div>
                    </div>
                    <div class="timer-card">
                        <div class="timer-title">📅 WEEKLY TIMER</div>
                        <div class="timer-display" id="weeklyTimer">--d --:--:--</div>
                    </div>
                </div>
                <div class="info-bar" id="infoBar">Loading...</div>
                <button class="chat-btn" onclick="enterChat()">💬 Enter Chat Room</button>
                <div id="adminBtn"></div>
            </div>
            <footer>🌿 Community Platform</footer>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const API_URL = '/api';
            let gameEndTime = null;
            let weeklyEndTime = null;
            let timerInterval = null;

            // =====================
            // FALLING OBJECTS
            // =====================

            const chessPieces = ['♔', '♕', '♖', '♗', '♘', '♙', '♚', '♛', '♜', '♝', '♞', '♟'];
            const books = ['📕', '📗', '📘', '📙', '📚', '📖', '📓', '📔'];
            const planetColors = [
                '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#1abc9c', 
                '#e67e22', '#2ecc71', '#f1c40f', '#e91e63', '#00bcd4',
                '#ff5722', '#8bc34a', '#ff9800', '#795548'
            ];

            function createFallingObjects() {
                const container = document.getElementById('fallingObjects');
                if (!container) return;

                const objectCount = 30;
                const fragment = document.createDocumentFragment();

                for (let i = 0; i < objectCount; i++) {
                    const obj = document.createElement('div');
                    obj.className = 'falling-object';
                    
                    // Randomize object type
                    const type = Math.random();
                    const left = Math.random() * 100;
                    const size = 20 + Math.random() * 40;
                    const duration = 8 + Math.random() * 15;
                    const delay = Math.random() * 20;
                    
                    obj.style.left = `${left}%`;
                    obj.style.width = `${size}px`;
                    obj.style.height = `${size}px`;

                    if (type < 0.35) {
                        // Chess piece
                        obj.classList.add('chess-piece');
                        obj.textContent = chessPieces[Math.floor(Math.random() * chessPieces.length)];
                        obj.style.fontSize = `${size}px`;
                        obj.style.animationName = Math.random() > 0.5 ? 'fall' : 'fallSlow';
                    } else if (type < 0.7) {
                        // Planet
                        obj.classList.add('planet');
                        obj.style.background = planetColors[Math.floor(Math.random() * planetColors.length)];
                        obj.style.width = `${size}px`;
                        obj.style.height = `${size}px`;
                        
                        // Add ring to some planets
                        if (Math.random() > 0.6) {
                            obj.style.boxShadow = `
                                inset -4px -4px 8px rgba(0,0,0,0.3),
                                0 0 15px rgba(255,255,255,0.2),
                                0 0 0 ${size * 0.2}px rgba(255,255,255,0.1)
                            `;
                        }
                        obj.style.animationName = Math.random() > 0.5 ? 'fallSlow' : 'fallFast';
                    } else {
                        // Book
                        obj.classList.add('book');
                        obj.textContent = books[Math.floor(Math.random() * books.length)];
                        obj.style.fontSize = `${size}px`;
                        obj.style.animationName = 'fall';
                    }

                    obj.style.animationDuration = `${duration}s`;
                    obj.style.animationDelay = `${delay}s`;
                    obj.style.animationIterationCount = 'infinite';

                    fragment.appendChild(obj);
                }

                container.appendChild(fragment);
            }

            // Floating particles
            function createParticles() {
                const container = document.getElementById('particles');
                if (!container) {
                    const particlesContainer = document.createElement('div');
                    particlesContainer.id = 'particles';
                    particlesContainer.style.cssText = `
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        pointer-events: none;
                        z-index: 2;
                    `;
                    document.body.appendChild(particlesContainer);
                }

                const particlesDiv = document.getElementById('particles');
                const fragment = document.createDocumentFragment();

                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    const size = 2 + Math.random() * 6;
                    const left = Math.random() * 100;
                    const duration = 5 + Math.random() * 10;
                    const delay = Math.random() * 8;
                    
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${left}%`;
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.animationDelay = `${delay}s`;
                    
                    fragment.appendChild(particle);
                }

                particlesDiv.appendChild(fragment);
            }

            // =====================
            // UTILITY FUNCTIONS
            // =====================

            function showLoading() {
                document.getElementById('loading').classList.remove('hide');
            }

            function hideLoading() {
                document.getElementById('loading').classList.add('hide');
            }

            async function apiFetch(url, options = {}) {
                const defaultOptions = {
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                };

                const response = await fetch(url, {
                    ...defaultOptions,
                    ...options,
                    headers: { ...defaultOptions.headers, ...options.headers }
                });

                if (response.status === 401) {
                    window.location.href = '/login.html';
                    throw new Error('Unauthorized');
                }

                return response;
            }

            async function getUser() {
                try {
                    const res = await apiFetch(`${API_URL}/auth/me`);
                    if (res.ok) return await res.json();
                    return null;
                } catch {
                    return null;
                }
            }

            async function loadSettings() {
                try {
                    const res = await apiFetch(`${API_URL}/settings`);
                    const data = await res.json();
                    const s = data.settings || {};
                    
                    // Game timer
                    const gh = parseInt(s.game_timer_hours) || 0;
                    const gm = parseInt(s.game_timer_minutes) || 0;
                    const gs = parseInt(s.game_timer_seconds) || 0;
                    
                    if (gh > 0 || gm > 0 || gs > 0) {
                        gameEndTime = new Date();
                        gameEndTime.setHours(gameEndTime.getHours() + gh);
                        gameEndTime.setMinutes(gameEndTime.getMinutes() + gm);
                        gameEndTime.setSeconds(gameEndTime.getSeconds() + gs);
                    }
                    
                    // Weekly timer
                    const wd = parseInt(s.weekly_timer_days) || 0;
                    const wh = parseInt(s.weekly_timer_hours) || 0;
                    const wm = parseInt(s.weekly_timer_minutes) || 0;
                    const ws = parseInt(s.weekly_timer_seconds) || 0;
                    
                    if (wd > 0 || wh > 0 || wm > 0 || ws > 0) {
                        weeklyEndTime = new Date();
                        weeklyEndTime.setDate(weeklyEndTime.getDate() + wd);
                        weeklyEndTime.setHours(weeklyEndTime.getHours() + wh);
                        weeklyEndTime.setMinutes(weeklyEndTime.getMinutes() + wm);
                        weeklyEndTime.setSeconds(weeklyEndTime.getSeconds() + ws);
                    }
                    
                    // Info bar
                    const infoBar = document.getElementById('infoBar');
                    if (infoBar) {
                        infoBar.innerHTML = s.info_bar_text || 'Welcome to Chylnx Hub! 🌿';
                        infoBar.style.background = s.info_bar_color || 
                            'linear-gradient(135deg, #2d8a2d, #4caf50)';
                    }
                    
                    updateTimers();
                    startTimerInterval();
                    
                } catch(e) {
                    console.error('Settings error:', e);
                }
            }

            function updateTimers() {
                const gameTimerEl = document.getElementById('gameTimer');
                const weeklyTimerEl = document.getElementById('weeklyTimer');

                if (gameTimerEl && gameEndTime) {
                    const diff = gameEndTime - new Date();
                    if (diff <= 0) {
                        gameTimerEl.innerHTML = '00:00:00';
                        gameTimerEl.style.color = '#ef4444';
                    } else {
                        const h = Math.floor(diff / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        gameTimerEl.innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                        gameTimerEl.style.color = '#fff';
                    }
                }

                if (weeklyTimerEl && weeklyEndTime) {
                    const diff = weeklyEndTime - new Date();
                    if (diff <= 0) {
                        weeklyTimerEl.innerHTML = '00d 00:00:00';
                        weeklyTimerEl.style.color = '#ef4444';
                    } else {
                        const d = Math.floor(diff / 86400000);
                        const h = Math.floor((diff % 86400000) / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        weeklyTimerEl.innerHTML = `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                        weeklyTimerEl.style.color = '#fff';
                    }
                }
            }

            function startTimerInterval() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(updateTimers, 1000);
            }

            // =====================
            // MAIN FUNCTIONS
            // =====================

            async function load() {
                showLoading();
                try {
                    const user = await getUser();
                    
                    if (!user) {
                        window.location.href = '/login.html';
                        return;
                    }
                    
                    document.getElementById('userName').innerHTML = 
                        `👤 <strong>${escapeHtml(user.fullName)}</strong><br><span style="font-size:11px;color:#666;">${escapeHtml(user.email)}</span>`;
                    
                    // Show admin button if admin
                    if (user.isAdmin) {
                        const adminBtnContainer = document.getElementById('adminBtn');
                        if (adminBtnContainer) {
                            const btn = document.createElement('button');
                            btn.className = 'chat-btn admin-btn';
                            btn.innerHTML = '👑 Admin Dashboard';
                            btn.onclick = () => window.location.href = '/admin_dashboard.html';
                            adminBtnContainer.appendChild(btn);
                        }
                    }
                    
                    await loadSettings();
                    
                } catch(e) {
                    console.error('Load error:', e);
                } finally {
                    hideLoading();
                }
            }

            async function enterChat() {
                try {
                    const res = await apiFetch(`${API_URL}/check-access`);
                    const data = await res.json();
                    window.location.href = data.hasAccess ? '/chat.html' : '/payment.html';
                } catch {
                    alert('Connection error. Please try again.');
                }
            }

            async function logout() {
                if (confirm('Are you sure you want to log out?')) {
                    try {
                        await apiFetch(`${API_URL}/auth/logout`, { method: 'POST' });
                    } catch {
                        // Continue with logout
                    } finally {
                        if (timerInterval) clearInterval(timerInterval);
                        localStorage.clear();
                        sessionStorage.clear();
                        window.location.href = '/login.html';
                    }
                }
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = String(text);
                return div.innerHTML;
            }

            // =====================
            // INITIALIZATION
            // =====================

            function init() {
                createFallingObjects();
                createParticles();
                load();
            }

            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // Expose functions globally
            window.enterChat = enterChat;
            window.logout = logout;

            // Clean up on page unload
            window.addEventListener('beforeunload', () => {
                if (timerInterval) clearInterval(timerInterval);
            });
        })();
    </script>
</body>
</html>
