<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chylnx Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
        .container{max-width:500px;margin:0 auto}
        .card{background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);padding:30px;text-align:center;color:#fff}
        .logo{font-size:36px;font-weight:800}
        .content{padding:30px}
        .user-info{background:#f3f4f6;border-radius:20px;padding:15px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .logout{background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:20px;cursor:pointer}
        .timers-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .timer-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:24px;padding:20px;text-align:center;color:#fff}
        .timer-title{font-size:18px;font-weight:600;margin-bottom:15px;opacity:.9}
        .timer-display{font-size:32px;font-weight:800;font-family:monospace;background:rgba(255,255,255,.1);padding:15px;border-radius:16px}
        .info-bar{background:#667eea;border-radius:16px;padding:15px 20px;margin-bottom:20px;text-align:center;color:#fff;font-size:14px}
        .chat-btn{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:16px;font-size:18px;font-weight:600;border-radius:50px;cursor:pointer;margin-top:10px}
        .admin-btn{background:#ef4444}
        footer{text-align:center;padding:20px;font-size:12px;color:#9ca3af;border-top:1px solid #e5e7eb}
        @media(max-width:600px){.timers-section{grid-template-columns:1fr}.timer-display{font-size:24px}}
        .loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;color:#fff;font-size:18px}
        .loading.hide{display:none}
    </style>
</head>
<body>
    <div id="loading" class="loading hide"><div>Loading... ⏳</div></div>
    
    <div class="container">
        <div class="card">
            <div class="header"><div class="logo">🎮 chylnx hub</div><div style="font-size:14px">Connect • Chat • Play</div></div>
            <div class="content">
                <div class="user-info"><span id="userName">Loading...</span><button class="logout" onclick="logout()">Logout</button></div>
                <div class="timers-section">
                    <div class="timer-card"><div class="timer-title">🎯 GAME TIMER</div><div class="timer-display" id="gameTimer">--:--:--</div></div>
                    <div class="timer-card"><div class="timer-title">📅 WEEKLY TIMER</div><div class="timer-display" id="weeklyTimer">--d --:--:--</div></div>
                </div>
                <div class="info-bar" id="infoBar">Loading...</div>
                <button class="chat-btn" onclick="enterChat()">💬 Enter Chat Room</button>
                <div id="adminBtn"></div>
            </div>
            <footer>Community Platform</footer>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let gameEndTime = null;
        let weeklyEndTime = null;

        function showLoading() { document.getElementById('loading').classList.remove('hide'); }
        function hideLoading() { document.getElementById('loading').classList.add('hide'); }

        async function getUser() {
            try {
                const res = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
                if (res.ok) return await res.json();
                return null;
            } catch { return null; }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`${API_URL}/settings`, { credentials: 'include' });
                const data = await res.json();
                const s = data.settings || {};
                
                // Game timer
                const gh = parseInt(s.game_timer_hours) || 0;
                const gm = parseInt(s.game_timer_minutes) || 0;
                const gs = parseInt(s.game_timer_seconds) || 0;
                gameEndTime = new Date();
                gameEndTime.setHours(gameEndTime.getHours() + gh);
                gameEndTime.setMinutes(gameEndTime.getMinutes() + gm);
                gameEndTime.setSeconds(gameEndTime.getSeconds() + gs);
                
                // Weekly timer
                const wd = parseInt(s.weekly_timer_days) || 0;
                const wh = parseInt(s.weekly_timer_hours) || 0;
                const wm = parseInt(s.weekly_timer_minutes) || 0;
                const ws = parseInt(s.weekly_timer_seconds) || 0;
                weeklyEndTime = new Date();
                weeklyEndTime.setDate(weeklyEndTime.getDate() + wd);
                weeklyEndTime.setHours(weeklyEndTime.getHours() + wh);
                weeklyEndTime.setMinutes(weeklyEndTime.getMinutes() + wm);
                weeklyEndTime.setSeconds(weeklyEndTime.getSeconds() + ws);
                
                // Info bar
                document.getElementById('infoBar').innerHTML = s.info_bar_text || 'Welcome to Chylnx Hub!';
                document.getElementById('infoBar').style.background = s.info_bar_color || '#667eea';
                
                updateTimers();
                setInterval(updateTimers, 1000);
            } catch(e) { console.error(e); }
        }

        function updateTimers() {
            if (gameEndTime) {
                const diff = gameEndTime - new Date();
                if (diff <= 0) document.getElementById('gameTimer').innerHTML = '00:00:00';
                else {
                    const h = Math.floor(diff / 36e5);
                    const m = Math.floor((diff % 36e5) / 6e4);
                    const s = Math.floor((diff % 6e4) / 1e3);
                    document.getElementById('gameTimer').innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
            }
            if (weeklyEndTime) {
                const diff = weeklyEndTime - new Date();
                if (diff <= 0) document.getElementById('weeklyTimer').innerHTML = '00d 00:00:00';
                else {
                    const d = Math.floor(diff / 864e5);
                    const h = Math.floor((diff % 864e5) / 36e5);
                    const m = Math.floor((diff % 36e5) / 6e4);
                    const s = Math.floor((diff % 6e4) / 1e3);
                    document.getElementById('weeklyTimer').innerHTML = `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
            }
        }

        async function load() {
            showLoading();
            try {
                const user = await getUser();
                if (!user) { window.location.href = '/login.html'; return; }
                
                document.getElementById('userName').innerHTML = `👤 ${user.fullName}<br><span style="font-size:11px">${user.email}</span>`;
                
                if (user.isAdmin) {
                    const btn = document.createElement('button');
                    btn.className = 'chat-btn admin-btn';
                    btn.innerHTML = '👑 Admin Dashboard';
                    btn.onclick = () => window.location.href = '/admin_dashboard.html';
                    document.getElementById('adminBtn').appendChild(btn);
                }
                
                await loadSettings();
            } catch(e) { console.error(e); }
            finally { hideLoading(); }
        }

        async function enterChat() {
            try {
                const res = await fetch(`${API_URL}/check-access`, { credentials: 'include' });
                const data = await res.json();
                window.location.href = data.hasAccess ? '/chat.html' : '/payment.html';
            } catch { alert('Connection error'); }
        }

        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
            localStorage.clear();
            window.location.href = '/login.html';
        }

        load();
    </script>
</body>
</html>
