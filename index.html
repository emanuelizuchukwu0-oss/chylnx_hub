<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chylnx Hub - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            margin-bottom: 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .logo {
            font-size: 36px;
            font-weight: 800;
        }
        .content {
            padding: 30px;
        }
        .user-info {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        /* Timers Section */
        .timers-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .timer-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .timer-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        .timer-display {
            font-size: 36px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 16px;
        }
        
        /* Info Bar */
        .info-bar {
            background: #667eea;
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        /* Chat Button */
        .chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
        }
        .admin-btn {
            background: #ef4444;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
        }
        
        @media (max-width: 600px) {
            .timers-section {
                grid-template-columns: 1fr;
            }
            .timer-display {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">🎮 chylnx hub</div>
                <div style="font-size: 14px; margin-top: 5px;">Connect • Chat • Play</div>
            </div>
            <div class="content">
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <button class="logout" onclick="logout()">Logout</button>
                </div>
                
                <!-- Timers Section -->
                <div class="timers-section">
                    <div class="timer-card">
                        <div class="timer-title">🎯 GAME TIMER</div>
                        <div class="timer-display" id="gameTimer">Loading...</div>
                    </div>
                    <div class="timer-card">
                        <div class="timer-title">📅 WEEKLY TIMER</div>
                        <div class="timer-display" id="weeklyTimer">Loading...</div>
                    </div>
                </div>
                
                <!-- Info Bar -->
                <div class="info-bar" id="infoBar">
                    Loading information...
                </div>
                
                <button class="chat-btn" onclick="enterChat()">💬 Enter Chat Room</button>
                <div id="adminBtn"></div>
            </div>
            <footer>Community Platform</footer>
        </div>
    </div>

    <script>
        let gameEndTime = null;
        let weeklyEndTime = null;
        
        async function getUser() {
            try {
                const res = await fetch('/api/auth/me', { credentials: 'include' });
                if (res.ok) return await res.json();
                return null;
            } catch {
                return null;
            }
        }
        
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings', { credentials: 'include' });
                const data = await res.json();
                const settings = data.settings;
                
                // Calculate game timer end time
                const gameHours = parseInt(settings.game_timer_hours) || 0;
                const gameMinutes = parseInt(settings.game_timer_minutes) || 0;
                const gameSeconds = parseInt(settings.game_timer_seconds) || 0;
                gameEndTime = new Date();
                gameEndTime.setHours(gameEndTime.getHours() + gameHours);
                gameEndTime.setMinutes(gameEndTime.getMinutes() + gameMinutes);
                gameEndTime.setSeconds(gameEndTime.getSeconds() + gameSeconds);
                
                // Calculate weekly timer end time
                const weeklyDays = parseInt(settings.weekly_timer_days) || 0;
                const weeklyHours = parseInt(settings.weekly_timer_hours) || 0;
                const weeklyMinutes = parseInt(settings.weekly_timer_minutes) || 0;
                const weeklySeconds = parseInt(settings.weekly_timer_seconds) || 0;
                weeklyEndTime = new Date();
                weeklyEndTime.setDate(weeklyEndTime.getDate() + weeklyDays);
                weeklyEndTime.setHours(weeklyEndTime.getHours() + weeklyHours);
                weeklyEndTime.setMinutes(weeklyEndTime.getMinutes() + weeklyMinutes);
                weeklyEndTime.setSeconds(weeklyEndTime.getSeconds() + weeklySeconds);
                
                // Update info bar
                const infoText = settings.info_bar_text || 'Welcome to Chylnx Hub!';
                const infoColor = settings.info_bar_color || '#667eea';
                document.getElementById('infoBar').innerHTML = infoText;
                document.getElementById('infoBar').style.background = infoColor;
                
                // Start timers
                updateTimers();
                setInterval(updateTimers, 1000);
                
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }
        
        function updateTimers() {
            if (gameEndTime) {
                const now = new Date();
                const diff = gameEndTime - now;
                
                if (diff <= 0) {
                    document.getElementById('gameTimer').innerHTML = '00:00:00';
                } else {
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    document.getElementById('gameTimer').innerHTML = 
                        `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            }
            
            if (weeklyEndTime) {
                const now = new Date();
                const diff = weeklyEndTime - now;
                
                if (diff <= 0) {
                    document.getElementById('weeklyTimer').innerHTML = '00d 00:00:00';
                } else {
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    document.getElementById('weeklyTimer').innerHTML = 
                        `${days}d ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            }
        }
        
        async function load() {
            const user = await getUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            document.getElementById('userName').innerHTML = `👤 ${user.fullName}<br><span style="font-size: 11px;">${user.email}</span>`;
            
            if (user.isAdmin) {
                const btn = document.createElement('button');
                btn.className = 'chat-btn admin-btn';
                btn.innerHTML = '👑 Admin Dashboard';
                btn.onclick = () => window.location.href = '/admin_dashboard.html';
                document.getElementById('adminBtn').appendChild(btn);
            }
            
            await loadSettings();
        }
        
        async function enterChat() {
            try {
                const res = await fetch('/api/check-access', { credentials: 'include' });
                const data = await res.json();
                if (data.hasAccess) {
                    window.location.href = '/chat.html';
                } else {
                    window.location.href = '/payment.html';
                }
            } catch {
                alert('Cannot connect to server');
            }
        }
        
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }
        
        load();
    </script>
</body>
</html>
