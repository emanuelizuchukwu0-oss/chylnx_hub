<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chylnx Hub</title>
    <style>
        :root{--green-dark:#0a3d0a;--green-mid:#1a5c1a;--green-light:#2d8a2d;--green-bright:#4caf50;--green-glow:#8bc34a}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(180deg,#0a3d0a 0%,#1a5c1a 30%,#0d4a0d 60%,#0a3d0a 100%);min-height:100vh;position:relative;overflow-x:hidden;padding:20px}
        .falling-objects{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
        .falling-object{position:absolute;top:-60px;animation:fall linear infinite;opacity:0.12;filter:blur(0.5px);will-change:transform}
        .chess-piece{font-size:30px;text-shadow:0 0 10px rgba(255,255,255,0.3)}
        .planet{border-radius:50%;box-shadow:inset -4px -4px 8px rgba(0,0,0,0.3),0 0 15px rgba(255,255,255,0.2)}
        .book{font-size:24px;text-shadow:0 0 8px rgba(255,255,255,0.2)}
        .particle{position:absolute;background:rgba(139,195,74,0.4);border-radius:50%;pointer-events:none;animation:floatUp linear infinite}
        @keyframes fall{0%{transform:translateY(-60px)rotate(0deg)translateX(0px);opacity:0}5%{opacity:0.15}90%{opacity:0.1}100%{transform:translateY(105vh)rotate(720deg)translateX(80px);opacity:0}}
        @keyframes fallSlow{0%{transform:translateY(-60px)rotate(0deg)translateX(0px);opacity:0}5%{opacity:0.12}90%{opacity:0.08}100%{transform:translateY(105vh)rotate(360deg)translateX(-60px);opacity:0}}
        @keyframes fallFast{0%{transform:translateY(-60px)rotate(0deg)translateX(0px);opacity:0}5%{opacity:0.2}90%{opacity:0.08}100%{transform:translateY(105vh)rotate(900deg)translateX(100px);opacity:0}}
        @keyframes floatUp{0%{transform:translateY(100vh)scale(0);opacity:0}10%{opacity:0.6}90%{opacity:0.2}100%{transform:translateY(-100px)scale(1.5);opacity:0}}
        @keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .container{max-width:500px;margin:0 auto;position:relative;z-index:10}
        .card{background:rgba(255,255,255,0.95);border-radius:40px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.35),0 0 30px rgba(76,175,80,0.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2)}
        .header{background:linear-gradient(135deg,#1a5c1a,#2d8a2d,#1a5c1a);padding:30px;text-align:center;color:#fff;position:relative;overflow:hidden}
        .header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.1)0%,transparent 70%);animation:rotate 20s linear infinite}
        .logo{font-size:36px;font-weight:800;position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,0.3)}
        .logo-subtitle{font-size:14px;position:relative;z-index:1;opacity:0.9;margin-top:5px}
        .content{padding:30px}
        .user-info{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:20px;padding:15px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;border:1px solid rgba(76,175,80,0.2)}
        .user-name-display{color:#0a3d0a;font-weight:500}
        .logout{background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:600}
        .logout:hover{background:#dc2626}
        .timers-section{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .timer-card{background:linear-gradient(135deg,#0a3d0a,#1a5c1a);border-radius:24px;padding:20px;text-align:center;color:#fff;border:1px solid rgba(139,195,74,0.3)}
        .timer-title{font-size:16px;font-weight:600;margin-bottom:10px;opacity:0.9}
        .timer-display{font-size:28px;font-weight:800;font-family:'Courier New',monospace;background:rgba(0,0,0,0.3);padding:12px;border-radius:16px;letter-spacing:1px}
        .info-bar{border-radius:16px;padding:15px 20px;margin-bottom:15px;text-align:center;color:#fff;font-size:14px;font-weight:500}
        .chat-btn{width:100%;background:linear-gradient(135deg,#2d8a2d,#4caf50);color:#fff;border:none;padding:16px;font-size:18px;font-weight:600;border-radius:50px;cursor:pointer;margin-top:10px}
        .chat-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(76,175,80,0.4)}
        .admin-btn{background:linear-gradient(135deg,#c62828,#ef4444)!important}
        .admin-btn:hover{box-shadow:0 10px 30px rgba(239,68,68,0.4)!important}
        footer{text-align:center;padding:20px;font-size:12px;color:#6b7280;border-top:1px solid #e5e7eb;background:rgba(255,255,255,0.5)}
        .loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,61,10,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;font-size:18px;gap:20px}
        .loading.hide{display:none}
        .loading-spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.2);border-top-color:#4caf50;border-radius:50%;animation:spin 0.8s linear infinite}
        @media(max-width:600px){body{padding:10px}.timers-section{grid-template-columns:1fr}.timer-display{font-size:24px}.logo{font-size:28px}.card{border-radius:30px}.content{padding:20px}}
    </style>
</head>
<body>
    <div class="falling-objects" id="fallingObjects"></div>
    <div id="particles"></div>
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <div>Loading your hub... ⏳</div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">🎮 chylnx hub</div>
                <div class="logo-subtitle">Connect • Chat • Play</div>
            </div>
            <div class="content">
                <div class="user-info">
                    <span class="user-name-display" id="userName">Loading...</span>
                    <button class="logout" onclick="logout()">🚪 Logout</button>
                </div>
                <div class="timers-section">
                    <div class="timer-card"><div class="timer-title">🎯 GAME TIMER</div><div class="timer-display" id="gameTimer">--:--:--</div></div>
                    <div class="timer-card"><div class="timer-title">📅 WEEKLY TIMER</div><div class="timer-display" id="weeklyTimer">--d --:--:--</div></div>
                </div>
                <div class="info-bar" id="infoBar1" style="background:linear-gradient(135deg,#2d8a2d,#4caf50)">Loading...</div>
                <div class="info-bar" id="infoBar2" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">Loading...</div>
                <div class="info-bar" id="infoBar3" style="background:linear-gradient(135deg,#667eea,#764ba2)">Loading...</div>
                <button class="chat-btn" onclick="enterChat()">💬 Enter Chat Room</button>
                <div id="adminBtn"></div>
            </div>
            <footer>🌿 Community Platform</footer>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            const API_URL = '/api';
            let gameEndTime = null, weeklyEndTime = null, timerInterval = null;

            const chessPieces = ['♔','♕','♖','♗','♘','♙','♚','♛','♜','♝','♞','♟'];
            const books = ['📕','📗','📘','📙','📚','📖','📓','📔'];
            const planetColors = ['#e74c3c','#3498db','#f39c12','#9b59b6','#1abc9c','#e67e22','#2ecc71','#f1c40f','#e91e63','#00bcd4','#ff5722','#8bc34a','#ff9800','#795548'];

            function createFallingObjects() {
                const c=document.getElementById('fallingObjects'); if(!c)return;
                const f=document.createDocumentFragment();
                for(let i=0;i<25;i++){
                    const o=document.createElement('div');o.className='falling-object';
                    const t=Math.random(),l=Math.random()*100,s=20+Math.random()*40;
                    o.style.cssText=`left:${l}%;width:${s}px;height:${s}px;animation-duration:${10+Math.random()*15}s;animation-delay:${Math.random()*20}s;animation-iteration-count:infinite`;
                    if(t<0.35){o.classList.add('chess-piece');o.textContent=chessPieces[Math.floor(Math.random()*chessPieces.length)];o.style.fontSize=s+'px';o.style.animationName=Math.random()>0.5?'fall':'fallSlow';}
                    else if(t<0.7){o.classList.add('planet');o.style.background=planetColors[Math.floor(Math.random()*planetColors.length)];if(Math.random()>0.6)o.style.boxShadow=`inset -4px -4px 8px rgba(0,0,0,0.3),0 0 15px rgba(255,255,255,0.2),0 0 0 ${s*0.2}px rgba(255,255,255,0.1)`;o.style.animationName=Math.random()>0.5?'fallSlow':'fallFast';}
                    else{o.classList.add('book');o.textContent=books[Math.floor(Math.random()*books.length)];o.style.fontSize=s+'px';o.style.animationName='fall';}
                    f.appendChild(o);
                }
                c.appendChild(f);
            }

            function createParticles() {
                let c=document.getElementById('particles');
                if(!c){c=document.createElement('div');c.id='particles';c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2';document.body.appendChild(c);}
                const f=document.createDocumentFragment();
                for(let i=0;i<15;i++){const p=document.createElement('div');p.classList.add('particle');p.style.cssText=`width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;f.appendChild(p);}
                c.appendChild(f);
            }

            function showLoading(){document.getElementById('loading').classList.remove('hide');}
            function hideLoading(){document.getElementById('loading').classList.add('hide');}
            function escapeHtml(t){if(!t)return'';const d=document.createElement('div');d.textContent=String(t);return d.innerHTML;}

            async function apiFetch(url,options={}){
                const res=await fetch(url,{credentials:'include',headers:{'Content-Type':'application/json'},...options,headers:{'Content-Type':'application/json',...options.headers}});
                if(res.status===401){if(!localStorage.getItem('chylnx_user'))window.location.href='/login.html';}
                return res;
            }

            async function getUser(){
                try{const res=await fetch(`${API_URL}/auth/me`,{credentials:'include'});if(res.ok){const u=await res.json();localStorage.setItem('chylnx_user',JSON.stringify(u));return u;}return null;}catch{return null;}
            }

            function getCachedUser(){try{const c=localStorage.getItem('chylnx_user');return c?JSON.parse(c):null;}catch(e){return null;}}

            async function loadTimersFromServer(){
                try{
                    const res=await fetch(`${API_URL}/timers`,{credentials:'include'});
                    const data=await res.json();
                    if(data.game_timer&&data.game_timer.end_time){gameEndTime=new Date(data.game_timer.end_time);}else{gameEndTime=null;}
                    if(data.weekly_timer&&data.weekly_timer.end_time){weeklyEndTime=new Date(data.weekly_timer.end_time);}else{weeklyEndTime=null;}
                }catch(e){gameEndTime=null;weeklyEndTime=null;}
            }

            async function loadSettings(){
                try{
                    const res=await fetch(`${API_URL}/settings`,{credentials:'include'});
                    const data=await res.json();
                    const s=data.settings||{};
                    const ib1=document.getElementById('infoBar1'),ib2=document.getElementById('infoBar2'),ib3=document.getElementById('infoBar3');
                    if(ib1){ib1.innerHTML=s.info_bar_text||'Welcome to Chylnx Hub! 🌿';ib1.style.background=s.info_bar_color||'linear-gradient(135deg,#2d8a2d,#4caf50)';}
                    if(ib2){ib2.innerHTML=s.info_bar2_text||'🎮 Join our gaming community!';ib2.style.background=s.info_bar2_color||'linear-gradient(135deg,#f59e0b,#ef4444)';}
                    if(ib3){ib3.innerHTML=s.info_bar3_text||'💰 Win amazing prizes daily!';ib3.style.background=s.info_bar3_color||'linear-gradient(135deg,#667eea,#764ba2)';}
                    await loadTimersFromServer();
                    updateTimers();startTimerInterval();
                }catch(e){console.error('Settings error:',e);}
            }

            function updateTimers(){
                const ge=document.getElementById('gameTimer'),we=document.getElementById('weeklyTimer');
                if(ge){if(gameEndTime){const d=gameEndTime-new Date();if(d<=0){ge.innerHTML='00:00:00';ge.style.color='#ef4444'}else{const h=Math.floor(d/36e5),m=Math.floor((d%36e5)/6e4),s=Math.floor((d%6e4)/1e3);ge.innerHTML=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;ge.style.color='#fff'}}else{ge.innerHTML='00:00:00';ge.style.color='#888';}}
                if(we){if(weeklyEndTime){const d=weeklyEndTime-new Date();if(d<=0){we.innerHTML='00d 00:00:00';we.style.color='#ef4444'}else{const dd=Math.floor(d/864e5),h=Math.floor((d%864e5)/36e5),m=Math.floor((d%36e5)/6e4),s=Math.floor((d%6e4)/1e3);we.innerHTML=`${dd}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;we.style.color='#fff'}}else{we.innerHTML='00d 00:00:00';we.style.color='#888';}}
            }

            function startTimerInterval(){if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(updateTimers,1000);}

            async function load(){
                showLoading();
                try{
                    const cached=getCachedUser();
                    if(cached)document.getElementById('userName').innerHTML=`👤 <strong>${escapeHtml(cached.fullName)}</strong><br><span style="font-size:11px;color:#666;">${escapeHtml(cached.email)}</span>`;
                    const user=await getUser();
                    if(!user){if(!cached){window.location.href='/login.html';return;}if(cached.isAdmin)showAdminBtn();await loadSettings();hideLoading();return;}
                    localStorage.setItem('chylnx_user',JSON.stringify(user));
                    document.getElementById('userName').innerHTML=`👤 <strong>${escapeHtml(user.fullName)}</strong><br><span style="font-size:11px;color:#666;">${escapeHtml(user.email)}</span>`;
                    if(user.isAdmin)showAdminBtn();
                    await loadSettings();
                }catch(e){if(!getCachedUser())window.location.href='/login.html';}
                finally{hideLoading();}
            }

          function showAdminBtn(){
    // Show Admin Dashboard button
    const c=document.getElementById('adminBtn');
    if(c&&!c.querySelector('button')){
        const b=document.createElement('button');
        b.className='chat-btn admin-btn';
        b.innerHTML='👑 Admin Dashboard';
        b.onclick=()=>window.location.href='/admin_dashboard.html';
        c.appendChild(b);
    }
    // ✅ Hide the "Enter Chat Room" button for admin
    const chatBtn = document.querySelector('.chat-btn:not(.admin-btn)');
    if(chatBtn) chatBtn.style.display = 'none';
}

            async function enterChat(){try{const r=await apiFetch(`${API_URL}/check-access`);const d=await r.json();window.location.href=d.hasAccess?'/chat.html':'/payment.html';}catch{alert('Connection error.');}}

            async function logout(){if(confirm('Are you sure?')){try{await apiFetch(`${API_URL}/auth/logout`,{method:'POST'});}catch(e){}if(timerInterval)clearInterval(timerInterval);localStorage.clear();sessionStorage.clear();window.location.href='/login.html';}}

            function init(){createFallingObjects();createParticles();load();}
            if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
            window.enterChat=enterChat;window.logout=logout;
            window.addEventListener('beforeunload',()=>{if(timerInterval)clearInterval(timerInterval);});
        })();
    </script>
</body>
</html>
