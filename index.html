<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chylnx Hub - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
        }

        .content {
            padding: 30px;
        }

        .user-info {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .feature-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            border-radius: 28px;
            padding: 30px;
            text-align: center;
        }

        .feature-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .feature-desc {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .chat-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .admin-btn {
            background: #ef4444;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="logo">chylnx hub</div>
            <div class="tagline">Connect • Chat • Share</div>
        </div>
        <div class="content">
            <div class="user-info">
                <span class="email-display" id="emailDisplay">Loading...</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="feature-card">
                <div class="feature-icon">💬</div>
                <div class="feature-title">Private Chat Room</div>
                <div class="feature-desc">Connect with everyone in real-time</div>
                <button class="chat-btn" id="chatBtn" onclick="checkAccessAndEnterChat()">🚀 Enter Chat</button>
            </div>
        </div>
        <footer>Community Platform</footer>
    </div>

    <script>
        const API_URL = '/api';

        async function getCurrentUser() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    return await response.json();
                }
                return null;
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        async function loadUserInfo() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            
            document.getElementById('emailDisplay').innerHTML = `👤 ${user.fullName}<br><span style="font-size: 11px;">${user.email}</span>`;
            
            if (user.isAdmin) {
                const featureCard = document.querySelector('.feature-card');
                const adminBtn = document.createElement('button');
                adminBtn.className = 'chat-btn admin-btn';
                adminBtn.innerHTML = '👑 Admin Dashboard';
                adminBtn.onclick = () => { window.location.href = '/admin_dashboard.html'; };
                featureCard.appendChild(adminBtn);
            }
        }

        async function checkAccessAndEnterChat() {
            try {
                const response = await fetch(`${API_URL}/check-access`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.hasAccess) {
                    window.location.href = '/chat.html';
                } else {
                    window.location.href = '/payment.html';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Cannot connect to server. Please try again.');
            }
        }

        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadUserInfo();
    </script>
</body>
</html>
