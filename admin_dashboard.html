<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chylnx Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            color: white;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #1a1a2e;
            padding: 20px;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .nav-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background: #2d2d44;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .header {
            background: #1a1a2e;
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .payment-item, .user-item, .code-item {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .payment-details {
            font-size: 14px;
        }

        .verify-btn, .approve-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .verify-btn:hover {
            background: #059669;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .create-code {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .create-code input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #0f0f1a;
            color: white;
        }

        .create-code button {
            background: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            color: white;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .badge-pending {
            background: #f59e0b;
            color: #1a1a2e;
        }

        .badge-approved {
            background: #10b981;
        }

        .delete-btn {
            background: #ef4444;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">chylnx hub<br><span style="font-size: 12px;">ADMIN</span></div>
        <div class="nav-item active" onclick="showSection('payments')">💰 Pending Payments</div>
        <div class="nav-item" onclick="showSection('users')">👥 Users</div>
        <div class="nav-item" onclick="showSection('referrals')">🎁 Referral Codes</div>
        <div class="nav-item" onclick="showSection('allpayments')">📋 All Payments</div>
        <div class="nav-item" onclick="logout()" style="margin-top: 50px; color: #ef4444;">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <span id="adminEmail">Loading...</span>
        </div>

        <div class="stats-grid" id="statsGrid">
            <!-- Stats will load here -->
        </div>

        <div id="paymentsSection" class="section">
            <h2>⏳ Pending Payment Verifications</h2>
            <div id="pendingPaymentsList">Loading...</div>
        </div>

        <div id="usersSection" class="section" style="display: none;">
            <h2>👥 Registered Users</h2>
            <div id="usersList">Loading...</div>
        </div>

        <div id="referralsSection" class="section" style="display: none;">
            <h2>🎁 Manage Referral Codes</h2>
            <div class="create-code">
                <input type="text" id="newCode" placeholder="NEW REFERRAL CODE">
                <input type="number" id="newUses" placeholder="Uses" value="10" style="width: 100px;">
                <input type="number" id="newDiscount" placeholder="Discount %" value="10" style="width: 100px;">
                <button onclick="createReferralCode()">+ Create Code</button>
            </div>
            <div id="referralCodesList">Loading...</div>
        </div>

        <div id="allpaymentsSection" class="section" style="display: none;">
            <h2>📋 All Payment Transactions</h2>
            <div id="allPaymentsList">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function getCurrentUser() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    return await response.json();
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        async function checkAdmin() {
            const user = await getCurrentUser();
            if (!user || !user.isAdmin) {
                window.location.href = 'login.html';
                return false;
            }
            document.getElementById('adminEmail').innerText = user.email;
            return true;
        }

        async function loadStats() {
            try {
                const [usersRes, paymentsRes] = await Promise.all([
                    fetch(`${API_URL}/admin/users`, { credentials: 'include' }),
                    fetch(`${API_URL}/admin/pending-payments`, { credentials: 'include' })
                ]);
                
                const users = await usersRes.json();
                const pending = await paymentsRes.json();
                
                const totalUsers = users.users?.length || 0;
                const verifiedUsers = users.users?.filter(u => u.payment_verified).length || 0;
                const pendingPayments = pending.payments?.length || 0;
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${totalUsers}</div>
                        <div>Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${verifiedUsers}</div>
                        <div>Verified Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${pendingPayments}</div>
                        <div>Pending Payments</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadPendingPayments() {
            try {
                const response = await fetch(`${API_URL}/admin/pending-payments`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.payments && data.payments.length > 0) {
                    document.getElementById('pendingPaymentsList').innerHTML = data.payments.map(payment => `
                        <div class="payment-item">
                            <div class="payment-details">
                                <strong>${payment.full_name}</strong><br>
                                📧 ${payment.user_email}<br>
                                🏦 ${payment.bank_name}<br>
                                🆔 Ref: ${payment.reference}<br>
                                💳 Method: ${payment.payment_method}<br>
                                💰 ₦${payment.amount}<br>
                                📅 ${new Date(payment.submitted_at).toLocaleString()}
                            </div>
                            <button class="verify-btn" onclick="verifyPayment(${payment.id})">✅ Verify & Grant Access</button>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('pendingPaymentsList').innerHTML = '<p style="color: #888;">No pending payments</p>';
                }
            } catch (error) {
                document.getElementById('pendingPaymentsList').innerHTML = '<p style="color: red;">Error loading payments</p>';
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                document.getElementById('usersList').innerHTML = data.users.map(user => `
                    <div class="user-item">
                        <div>
                            <strong>${user.full_name}</strong><br>
                            📧 ${user.email}<br>
                            🎭 Display: ${user.display_name || 'Not set'}<br>
                            🎁 Referral: ${user.referral_code_used || 'None'}<br>
                            📅 Joined: ${new Date(user.created_at).toLocaleDateString()}
                        </div>
                        <div>
                            <span class="badge ${user.payment_verified ? 'badge-approved' : 'badge-pending'}">
                                ${user.payment_verified ? '✅ Verified' : '⏳ Pending'}
                            </span>
                            ${!user.payment_verified ? `<button class="verify-btn" style="margin-left: 10px; background: #667eea;" onclick="verifyUserManually('${user.email}')">🔓 Verify Manually</button>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('usersList').innerHTML = '<p style="color: red;">Error loading users</p>';
            }
        }

        async function loadReferralCodes() {
            try {
                const response = await fetch(`${API_URL}/admin/referral-codes`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                document.getElementById('referralCodesList').innerHTML = data.codes.map(code => `
                    <div class="code-item">
                        <div>
                            <strong style="font-family: monospace; font-size: 18px;">${code.code}</strong><br>
                            Uses left: ${code.uses_remaining} | Discount: ${code.discount_percent}%<br>
                            Created by: ${code.created_by} | ${new Date(code.created_at).toLocaleDateString()}
                        </div>
                        <button class="delete-btn" onclick="deleteReferralCode('${code.code}')">Delete</button>
                    </div>
                `).join('');
                
                if (data.codes.length === 0) {
                    document.getElementById('referralCodesList').innerHTML = '<p style="color: #888;">No referral codes</p>';
                }
            } catch (error) {
                document.getElementById('referralCodesList').innerHTML = '<p style="color: red;">Error loading codes</p>';
            }
        }

        async function loadAllPayments() {
            try {
                const response = await fetch(`${API_URL}/admin/all-payments`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                document.getElementById('allPaymentsList').innerHTML = data.payments.map(payment => `
                    <div class="payment-item">
                        <div class="payment-details">
                            <strong>${payment.full_name}</strong><br>
                            📧 ${payment.user_email}<br>
                            🏦 ${payment.bank_name}<br>
                            🆔 Ref: ${payment.reference}<br>
                            💳 Method: ${payment.payment_method}<br>
                            💰 ₦${payment.amount}<br>
                            📅 ${new Date(payment.submitted_at).toLocaleString()}<br>
                            Status: <span class="badge ${payment.status === 'approved' ? 'badge-approved' : 'badge-pending'}">${payment.status}</span>
                            ${payment.verified_at ? `✅ Verified: ${new Date(payment.verified_at).toLocaleString()}` : ''}
                        </div>
                    </div>
                `).join('');
                
                if (data.payments.length === 0) {
                    document.getElementById('allPaymentsList').innerHTML = '<p style="color: #888;">No payments recorded</p>';
                }
            } catch (error) {
                document.getElementById('allPaymentsList').innerHTML = '<p style="color: red;">Error loading payments</p>';
            }
        }

        async function verifyPayment(paymentId) {
            try {
                const response = await fetch(`${API_URL}/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ paymentId })
                });
                
                if (response.ok) {
                    alert('✅ Payment verified! User can now access chat.');
                    loadPendingPayments();
                    loadStats();
                    loadUsers();
                } else {
                    alert('❌ Failed to verify payment');
                }
            } catch (error) {
                alert('Error verifying payment');
            }
        }

        async function verifyUserManually(email) {
            try {
                const response = await fetch(`${API_URL}/admin/verify-user-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email })
                });
                
                if (response.ok) {
                    alert(`✅ ${email} has been verified!`);
                    loadUsers();
                    loadStats();
                } else {
                    alert('❌ Failed to verify user');
                }
            } catch (error) {
                alert('Error verifying user');
            }
        }

        async function createReferralCode() {
            const code = document.getElementById('newCode').value.trim().toUpperCase();
            const usesRemaining = parseInt(document.getElementById('newUses').value);
            const discountPercent = parseInt(document.getElementById('newDiscount').value);
            
            if (!code) {
                alert('Please enter a code');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/admin/create-referral`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ code, usesRemaining, discountPercent })
                });
                
                if (response.ok) {
                    alert('✅ Referral code created!');
                    document.getElementById('newCode').value = '';
                    loadReferralCodes();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to create code');
                }
            } catch (error) {
                alert('Error creating code');
            }
        }

        async function deleteReferralCode(code) {
            if (!confirm(`Delete referral code "${code}"?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/admin/delete-referral`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ code })
                });
                
                if (response.ok) {
                    alert('✅ Code deleted');
                    loadReferralCodes();
                } else {
                    alert('Failed to delete code');
                }
            } catch (error) {
                alert('Error deleting code');
            }
        }

        function showSection(section) {
            // Hide all sections
            document.getElementById('paymentsSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            document.getElementById('referralsSection').style.display = 'none';
            document.getElementById('allpaymentsSection').style.display = 'none';
            
            // Show selected
            document.getElementById(`${section}Section`).style.display = 'block';
            
            // Update nav active states
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            // Load data based on section
            if (section === 'payments') loadPendingPayments();
            if (section === 'users') loadUsers();
            if (section === 'referrals') loadReferralCodes();
            if (section === 'allpayments') loadAllPayments();
        }

        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
            window.location.href = 'login.html';
        }

        async function init() {
            const isAdmin = await checkAdmin();
            if (!isAdmin) return;
            
            await loadStats();
            await loadPendingPayments();
        }

        init();
    </script>
</body>
</html>
