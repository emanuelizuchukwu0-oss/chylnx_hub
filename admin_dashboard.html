<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chylnx Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: white;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #1a1a2e;
            padding: 20px;
            overflow-y: auto;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }
        .nav-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item:hover {
            background: #2d2d44;
        }
        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }
        .header {
            background: #1a1a2e;
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        .payment-item, .user-item {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .verify-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .badge-pending {
            background: #f59e0b;
        }
        .badge-approved {
            background: #10b981;
        }
        .setting-group {
            margin-bottom: 20px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 12px;
        }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .setting-group input, .setting-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #2d2d44;
            color: white;
        }
        .setting-group input[type="color"] {
            height: 50px;
        }
        .setting-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        .chat-access-btn {
            background: #10b981;
            margin-top: 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">chylnx hub<br><span style="font-size: 12px;">ADMIN</span></div>
        <div class="nav-item" onclick="showSection('payments')">💰 Pending Payments</div>
        <div class="nav-item" onclick="showSection('users')">👥 Users</div>
        <div class="nav-item active" onclick="showSection('timers')">⏰ Timers & Info Bar</div>
        <div class="nav-item" onclick="logout()" style="margin-top: 50px; color: #ef4444;">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <span id="adminEmail">Loading...</span>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div id="paymentsSection" class="section" style="display: none;">
            <h2>⏳ Pending Payment Verifications</h2>
            <div id="pendingPaymentsList">Loading...</div>
        </div>

        <div id="usersSection" class="section" style="display: none;">
            <h2>👥 Registered Users</h2>
            <div id="usersList">Loading...</div>
        </div>

        <div id="timersSection" class="section">
            <h2>⏰ Timer & Info Bar Settings</h2>
            
            <div class="setting-group">
                <h3>🎮 Game Timer</h3>
                <div class="setting-row">
                    <div>
                        <label>Hours</label>
                        <input type="number" id="gameHours" min="0" max="168" value="24">
                    </div>
                    <div>
                        <label>Minutes</label>
                        <input type="number" id="gameMinutes" min="0" max="59" value="0">
                    </div>
                    <div>
                        <label>Seconds</label>
                        <input type="number" id="gameSeconds" min="0" max="59" value="0">
                    </div>
                </div>
            </div>
            
            <div class="setting-group">
                <h3>📅 Weekly Timer</h3>
                <div class="setting-row">
                    <div>
                        <label>Days</label>
                        <input type="number" id="weeklyDays" min="0" max="30" value="7">
                    </div>
                    <div>
                        <label>Hours</label>
                        <input type="number" id="weeklyHours" min="0" max="23" value="0">
                    </div>
                    <div>
                        <label>Minutes</label>
                        <input type="number" id="weeklyMinutes" min="0" max="59" value="0">
                    </div>
                    <div>
                        <label>Seconds</label>
                        <input type="number" id="weeklySeconds" min="0" max="59" value="0">
                    </div>
                </div>
            </div>
            
            <div class="setting-group">
                <h3>📢 Info Bar</h3>
                <label>Message Text</label>
                <input type="text" id="infoText" placeholder="Enter announcement message">
                <label style="margin-top: 10px;">Background Color</label>
                <input type="color" id="infoColor" value="#667eea">
            </div>
            
            <button class="save-btn" onclick="saveAllSettings()">💾 Save All Settings</button>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        async function getCurrentUser() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
                if (response.ok) return await response.json();
                return null;
            } catch {
                return null;
            }
        }

        async function checkAdmin() {
            const user = await getCurrentUser();
            if (!user || !user.isAdmin) {
                window.location.href = '/login.html';
                return false;
            }
            document.getElementById('adminEmail').innerText = user.email;
            return true;
        }

        async function loadSettings() {
            try {
                const res = await fetch(`${API_URL}/settings`, { credentials: 'include' });
                const data = await res.json();
                const settings = data.settings;
                
                document.getElementById('gameHours').value = settings.game_timer_hours || 24;
                document.getElementById('gameMinutes').value = settings.game_timer_minutes || 0;
                document.getElementById('gameSeconds').value = settings.game_timer_seconds || 0;
                document.getElementById('weeklyDays').value = settings.weekly_timer_days || 7;
                document.getElementById('weeklyHours').value = settings.weekly_timer_hours || 0;
                document.getElementById('weeklyMinutes').value = settings.weekly_timer_minutes || 0;
                document.getElementById('weeklySeconds').value = settings.weekly_timer_seconds || 0;
                document.getElementById('infoText').value = settings.info_bar_text || 'Welcome to Chylnx Hub! 🎮 Join our community chat and connect with others.';
                document.getElementById('infoColor').value = settings.info_bar_color || '#667eea';
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        async function saveAllSettings() {
            const settings = [
                { key: 'game_timer_hours', value: document.getElementById('gameHours').value },
                { key: 'game_timer_minutes', value: document.getElementById('gameMinutes').value },
                { key: 'game_timer_seconds', value: document.getElementById('gameSeconds').value },
                { key: 'weekly_timer_days', value: document.getElementById('weeklyDays').value },
                { key: 'weekly_timer_hours', value: document.getElementById('weeklyHours').value },
                { key: 'weekly_timer_minutes', value: document.getElementById('weeklyMinutes').value },
                { key: 'weekly_timer_seconds', value: document.getElementById('weeklySeconds').value },
                { key: 'info_bar_text', value: document.getElementById('infoText').value },
                { key: 'info_bar_color', value: document.getElementById('infoColor').value }
            ];
            
            for (const setting of settings) {
                try {
                    await fetch(`${API_URL}/admin/update-settings`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(setting)
                    });
                } catch (error) {
                    console.error('Error saving:', setting.key);
                }
            }
            
            alert('✅ All settings saved successfully!');
        }

        async function loadStats() {
            try {
                const usersRes = await fetch(`${API_URL}/admin/users`, { credentials: 'include' });
                const paymentsRes = await fetch(`${API_URL}/admin/pending-payments`, { credentials: 'include' });
                
                const users = await usersRes.json();
                const pending = await paymentsRes.json();
                
                const totalUsers = users.users?.length || 0;
                const verifiedUsers = users.users?.filter(u => u.payment_verified).length || 0;
                const pendingPayments = pending.payments?.length || 0;
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${totalUsers}</div>
                        <div>Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${verifiedUsers}</div>
                        <div>Verified Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${pendingPayments}</div>
                        <div>Pending Payments</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadPendingPayments() {
            try {
                const response = await fetch(`${API_URL}/admin/pending-payments`, { credentials: 'include' });
                const data = await response.json();
                
                if (data.payments && data.payments.length > 0) {
                    document.getElementById('pendingPaymentsList').innerHTML = data.payments.map(payment => `
                        <div class="payment-item">
                            <div>
                                <strong>${escapeHtml(payment.full_name)}</strong><br>
                                📧 ${escapeHtml(payment.user_email)}<br>
                                🏦 ${escapeHtml(payment.bank_name)}<br>
                                🆔 Ref: ${escapeHtml(payment.reference)}
                            </div>
                            <button class="verify-btn" onclick="verifyPayment(${payment.id})">✅ Verify & Grant Access</button>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('pendingPaymentsList').innerHTML = '<p>No pending payments</p>';
                }
            } catch (error) {
                document.getElementById('pendingPaymentsList').innerHTML = '<p>Error loading payments</p>';
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, { credentials: 'include' });
                const data = await response.json();
                
                document.getElementById('usersList').innerHTML = data.users.map(user => `
                    <div class="user-item">
                        <div>
                            <strong>${escapeHtml(user.full_name)}</strong><br>
                            📧 ${escapeHtml(user.email)}<br>
                            ${user.payment_verified ? '<span class="badge badge-approved">✅ Verified</span>' : '<span class="badge badge-pending">⏳ Pending</span>'}
                        </div>
                        <div>
                            ${!user.payment_verified ? `<button class="verify-btn" onclick="verifyUserManually('${user.email}')">🔓 Verify Manually</button>` : ''}
                            <button class="verify-btn chat-access-btn" onclick="grantChatAccess('${user.email}')">💬 Grant Chat Access</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('usersList').innerHTML = '<p>Error loading users</p>';
            }
        }

        async function verifyPayment(paymentId) {
            try {
                const response = await fetch(`${API_URL}/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ paymentId })
                });
                
                if (response.ok) {
                    alert('✅ Payment verified! User can now access chat.');
                    loadPendingPayments();
                    loadStats();
                    loadUsers();
                } else {
                    alert('❌ Failed to verify payment');
                }
            } catch (error) {
                alert('Error verifying payment');
            }
        }

        async function verifyUserManually(email) {
            try {
                const response = await fetch(`${API_URL}/admin/verify-user-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email })
                });
                
                if (response.ok) {
                    alert(`✅ ${email} has been verified!`);
                    loadUsers();
                    loadStats();
                } else {
                    alert('❌ Failed to verify user');
                }
            } catch (error) {
                alert('Error verifying user');
            }
        }

        async function grantChatAccess(email) {
            try {
                const displayName = prompt('Enter a display name for this user:', email.split('@')[0]);
                if (!displayName) return;
                
                await fetch(`${API_URL}/admin/set-display-name`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, displayName })
                });
                
                await fetch(`${API_URL}/admin/verify-user-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email })
                });
                
                alert(`✅ ${email} can now access the chat!`);
                loadUsers();
                loadStats();
            } catch (error) {
                alert('Error granting access');
            }
        }

        function showSection(section) {
            document.getElementById('paymentsSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            document.getElementById('timersSection').style.display = 'none';
            
            document.getElementById(`${section}Section`).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            if (section === 'payments') loadPendingPayments();
            if (section === 'users') loadUsers();
            if (section === 'timers') loadSettings();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }

        async function init() {
            const isAdmin = await checkAdmin();
            if (!isAdmin) return;
            
            await loadStats();
            await loadPendingPayments();
            await loadSettings();
        }

        init();
    </script>
</body>
</html>
