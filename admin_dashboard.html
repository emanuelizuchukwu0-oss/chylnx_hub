<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chylnx Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            color: white;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #1a1a2e;
            padding: 20px;
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .nav-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background: #2d2d44;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .header {
            background: #1a1a2e;
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .payment-item, .user-item {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .payment-details {
            font-size: 14px;
        }

        .verify-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .badge-pending {
            background: #f59e0b;
            color: #1a1a2e;
        }

        .badge-approved {
            background: #10b981;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">chylnx hub<br><span style="font-size: 12px;">ADMIN</span></div>
        <div class="nav-item active" onclick="showSection('payments')">💰 Pending Payments</div>
        <div class="nav-item" onclick="showSection('users')">👥 Users</div>
        <div class="nav-item" onclick="logout()" style="margin-top: 50px; color: #ef4444;">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <span id="adminEmail">Loading...</span>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div id="paymentsSection" class="section">
            <h2>⏳ Pending Payment Verifications</h2>
            <div id="pendingPaymentsList">Loading...</div>
        </div>

        <div id="usersSection" class="section" style="display: none;">
            <h2>👥 Registered Users</h2>
            <div id="usersList">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        async function getCurrentUser() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include'
                });
                if (response.ok) {
                    return await response.json();
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        async function checkAdmin() {
            const user = await getCurrentUser();
            if (!user || !user.isAdmin) {
                window.location.href = '/login.html';
                return false;
            }
            document.getElementById('adminEmail').innerText = user.email;
            return true;
        }

        async function loadStats() {
            try {
                const usersRes = await fetch(`${API_URL}/admin/users`, { credentials: 'include' });
                const paymentsRes = await fetch(`${API_URL}/admin/pending-payments`, { credentials: 'include' });
                
                const users = await usersRes.json();
                const pending = await paymentsRes.json();
                
                const totalUsers = users.users?.length || 0;
                const verifiedUsers = users.users?.filter(u => u.payment_verified).length || 0;
                const pendingPayments = pending.payments?.length || 0;
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${totalUsers}</div>
                        <div>Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${verifiedUsers}</div>
                        <div>Verified Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${pendingPayments}</div>
                        <div>Pending Payments</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadPendingPayments() {
            try {
                const response = await fetch(`${API_URL}/admin/pending-payments`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.payments && data.payments.length > 0) {
                    document.getElementById('pendingPaymentsList').innerHTML = data.payments.map(payment => `
                        <div class="payment-item">
                            <div class="payment-details">
                                <strong>${escapeHtml(payment.full_name)}</strong><br>
                                📧 ${escapeHtml(payment.user_email)}<br>
                                🏦 ${escapeHtml(payment.bank_name)}<br>
                                🆔 Ref: ${escapeHtml(payment.reference)}<br>
                                💳 Method: ${escapeHtml(payment.payment_method)}<br>
                                💰 ₦${payment.amount}<br>
                                📅 ${new Date(payment.submitted_at).toLocaleString()}
                            </div>
                            <button class="verify-btn" onclick="verifyPayment(${payment.id})">✅ Verify & Grant Access</button>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('pendingPaymentsList').innerHTML = '<p style="color: #888;">No pending payments</p>';
                }
            } catch (error) {
                document.getElementById('pendingPaymentsList').innerHTML = '<p style="color: red;">Error loading payments</p>';
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                document.getElementById('usersList').innerHTML = data.users.map(user => `
                    <div class="user-item">
                        <div>
                            <strong>${escapeHtml(user.full_name)}</strong><br>
                            📧 ${escapeHtml(user.email)}<br>
                            ${user.payment_verified ? '✅ Verified' : '⏳ Pending'}
                        </div>
                        ${!user.payment_verified ? `<button class="verify-btn" onclick="verifyUserManually('${user.email}')">🔓 Verify Manually</button>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('usersList').innerHTML = '<p style="color: red;">Error loading users</p>';
            }
        }

        async function verifyPayment(paymentId) {
            try {
                const response = await fetch(`${API_URL}/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ paymentId })
                });
                
                if (response.ok) {
                    alert('✅ Payment verified! User can now access chat.');
                    loadPendingPayments();
                    loadStats();
                    loadUsers();
                } else {
                    alert('❌ Failed to verify payment');
                }
            } catch (error) {
                alert('Error verifying payment');
            }
        }

        async function verifyUserManually(email) {
            try {
                const response = await fetch(`${API_URL}/admin/verify-user-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email })
                });
                
                if (response.ok) {
                    alert(`✅ ${email} has been verified!`);
                    loadUsers();
                    loadStats();
                } else {
                    alert('❌ Failed to verify user');
                }
            } catch (error) {
                alert('Error verifying user');
            }
        }

        function showSection(section) {
            document.getElementById('paymentsSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            
            document.getElementById(`${section}Section`).style.display = 'block';
            
            if (section === 'payments') loadPendingPayments();
            if (section === 'users') loadUsers();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function logout() {
            await fetch(`${API_URL}/auth/logout`, { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }

        async function init() {
            const isAdmin = await checkAdmin();
            if (!isAdmin) return;
            
            await loadStats();
            await loadPendingPayments();
        }

        init();
    </script>
</body>
</html>
