<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Payment - Chylnx Hub</title>
    <style>
        :root {
            --green-dark: #0a3d0a;
            --green-mid: #1a5c1a;
            --green-light: #2d8a2d;
            --green-bright: #4caf50;
            --green-glow: #8bc34a;
            --gold: #f59e0b;
            --gold-light: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0a3d0a 0%, #1a5c1a 30%, #0d4a0d 60%, #0a3d0a 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===================== */
        /* FALLING OBJECTS       */
        /* ===================== */
        .falling-objects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .falling-object {
            position: absolute;
            top: -60px;
            animation: fall linear infinite;
            opacity: 0.1;
            filter: blur(0.5px);
            will-change: transform;
        }

        .chess-piece {
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .planet {
            border-radius: 50%;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.2);
        }

        .book {
            font-size: 24px;
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        .money-fall {
            font-size: 22px;
            text-shadow: 0 0 12px rgba(255,215,0,0.4);
        }

        .particle {
            position: absolute;
            background: rgba(139,195,74,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        .sparkle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s ease-in-out infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-60px) rotate(0deg) translateX(0px);
                opacity: 0;
            }
            5% { opacity: 0.15; }
            90% { opacity: 0.1; }
            100% {
                transform: translateY(105vh) rotate(720deg) translateX(80px);
                opacity: 0;
            }
        }

        @keyframes fallSlow {
            0% {
                transform: translateY(-60px) rotate(0deg) translateX(0px);
                opacity: 0;
            }
            5% { opacity: 0.12; }
            90% { opacity: 0.08; }
            100% {
                transform: translateY(105vh) rotate(360deg) translateX(-60px);
                opacity: 0;
            }
        }

        @keyframes fallFast {
            0% {
                transform: translateY(-60px) rotate(0deg) translateX(0px);
                opacity: 0;
            }
            5% { opacity: 0.18; }
            90% { opacity: 0.08; }
            100% {
                transform: translateY(105vh) rotate(900deg) translateX(100px);
                opacity: 0;
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(76,175,80,0.3); }
            50% { box-shadow: 0 0 40px rgba(139,195,74,0.5); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* ===================== */
        /* MAIN CONTAINER        */
        /* ===================== */
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            position: relative;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Payment Card */
        .payment-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3), 0 0 60px rgba(76,175,80,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulse 4s ease-in-out infinite;
        }

        /* Bank Details */
        .bank-details {
            background: linear-gradient(135deg, #1a5c1a, #2d8a2d, #1a5c1a);
            color: #fff;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bank-details::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bank-details > * {
            position: relative;
            z-index: 1;
        }

        .bank-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .bank-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .account-label {
            font-size: 11px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .account-number {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 3px;
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            border: 1px dashed rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: all;
        }

        .account-number:hover {
            background: rgba(255,255,255,0.25);
        }

        .copy-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 24px;
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            margin: 10px 0;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .amount {
            font-size: 36px;
            font-weight: 800;
            margin: 15px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .account-name {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .copied-toast {
            background: #22c55e;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            animation: fadeIn 0.3s ease;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section Title */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-number {
            background: #2d8a2d;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* Payment Methods */
        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .method-btn {
            flex: 1;
            min-width: 80px;
            padding: 14px 10px;
            border: 2px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            color: #6b7280;
        }

        .method-btn:hover {
            border-color: #4caf50;
            background: #f0fdf4;
        }

        .method-btn.active {
            border-color: #2d8a2d;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            color: #1a5c1a;
            box-shadow: 0 4px 15px rgba(76,175,80,0.2);
        }

        .method-btn .icon {
            display: block;
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #f9fafb;
            color: #1f2937;
        }

        input:focus {
            border-color: #4caf50;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(76,175,80,0.1);
        }

        input::placeholder {
            color: #9ca3af;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #2d8a2d, #4caf50);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
            margin-top: 5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76,175,80,0.4);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Back Link */
        .back-link {
            display: block;
            text-align: center;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #fff;
        }

        .back-link .arrow {
            transition: transform 0.2s ease;
            display: inline-block;
        }

        .back-link:hover .arrow {
            transform: translateX(-3px);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            animation: slideDown 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .toast.success {
            background: #22c55e;
            color: #fff;
        }

        .toast.error {
            background: #ef4444;
            color: #fff;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,61,10,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #fff;
            gap: 16px;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #4caf50;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .payment-card {
                padding: 20px 15px;
                border-radius: 24px;
            }

            .bank-details {
                padding: 20px 15px;
                border-radius: 20px;
            }

            .account-number {
                font-size: 24px;
                letter-spacing: 2px;
            }

            .amount {
                font-size: 28px;
            }

            .submit-btn {
                font-size: 15px;
                padding: 14px;
            }

            .method-btn {
                font-size: 12px;
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Falling Objects -->
    <div class="falling-objects" id="fallingObjects"></div>

    <!-- Floating Particles -->
    <div id="particlesContainer"></div>

    <!-- Sparkles -->
    <div id="sparklesContainer"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <div>Submitting your payment... ⏳</div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="header">
            <div class="logo">💎 chylnx hub</div>
            <p class="header-subtitle">One-time payment for lifetime access</p>
        </div>

        <div class="payment-card">
            <!-- Bank Details -->
            <div class="bank-details">
                <div class="bank-icon">🏦</div>
                <div class="bank-name">GTBank (Nigeria)</div>
                <div class="account-label">Account Number</div>
                <div class="account-number" id="accountNumber" onclick="copyAccount()" title="Click to copy">
                    0123456789
                </div>
                <button class="copy-btn" onclick="copyAccount()">
                    📋 Copy Account Number
                </button>
                <div class="amount">₦2,500 ONLY</div>
                <div class="account-name">Account Name: CHYLNX HUB</div>
            </div>

            <!-- Payment Confirmation Form -->
            <div class="section-title">
                <span class="step-number">1</span> Select Payment Method
            </div>
            <div class="payment-methods">
                <button class="method-btn" data-method="ussd">
                    <span class="icon">💳</span> USSD
                </button>
                <button class="method-btn" data-method="transfer">
                    <span class="icon">🏦</span> Transfer
                </button>
                <button class="method-btn" data-method="pos">
                    <span class="icon">💻</span> POS
                </button>
            </div>

            <div class="section-title">
                <span class="step-number">2</span> Confirm Your Payment
            </div>
            <div class="input-group">
                <span class="input-icon">🏦</span>
                <input type="text" id="bankName" placeholder="Your Bank Name (e.g., GTBank, UBA, Access)" maxlength="100">
            </div>
            <div class="input-group">
                <span class="input-icon">🧾</span>
                <input type="text" id="referenceNumber" placeholder="Transaction Reference / Teller Number" maxlength="200">
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitPayment()">
                ✅ I HAVE PAID - Submit for Verification
            </button>
        </div>

        <a href="/index.html" class="back-link">
            <span class="arrow">←</span> Back to Home
        </a>
    </div>

    <script>
        (function() {
            'use strict';

            const API_URL = '/api';
            let selectedMethod = 'transfer';

            // =====================
            // FALLING OBJECTS
            // =====================

            const chessPieces = ['♔', '♕', '♖', '♗', '♘', '♙', '♚', '♛', '♜', '♝', '♞', '♟'];
            const books = ['📕', '📗', '📘', '📙', '📚', '📖', '📓', '📔'];
            const moneyEmojis = ['💰', '💵', '💎', '🪙', '💷', '💶', '💴', '✨'];
            const planetColors = [
                '#e74c3c', '#3498db', '#f39c12', '#9b59b6', '#1abc9c',
                '#e67e22', '#2ecc71', '#f1c40f', '#e91e63', '#00bcd4',
                '#ff5722', '#8bc34a', '#ff9800', '#795548'
            ];

            function createFallingObjects() {
                const container = document.getElementById('fallingObjects');
                if (!container) return;

                const objectCount = 28;
                const fragment = document.createDocumentFragment();

                for (let i = 0; i < objectCount; i++) {
                    const obj = document.createElement('div');
                    obj.className = 'falling-object';
                    
                    const type = Math.random();
                    const left = Math.random() * 100;
                    const size = 18 + Math.random() * 38;
                    const duration = 8 + Math.random() * 15;
                    const delay = Math.random() * 20;
                    
                    obj.style.left = `${left}%`;
                    obj.style.width = `${size}px`;
                    obj.style.height = `${size}px`;
                    obj.style.animationDuration = `${duration}s`;
                    obj.style.animationDelay = `${delay}s`;
                    obj.style.animationIterationCount = 'infinite';

                    if (type < 0.25) {
                        // Chess piece
                        obj.classList.add('chess-piece');
                        obj.textContent = chessPieces[Math.floor(Math.random() * chessPieces.length)];
                        obj.style.fontSize = `${size}px`;
                        obj.style.animationName = Math.random() > 0.5 ? 'fall' : 'fallSlow';
                    } else if (type < 0.45) {
                        // Planet
                        obj.classList.add('planet');
                        obj.style.background = planetColors[Math.floor(Math.random() * planetColors.length)];
                        if (Math.random() > 0.5) {
                            obj.style.boxShadow = `
                                inset -4px -4px 8px rgba(0,0,0,0.3),
                                0 0 15px rgba(255,255,255,0.2),
                                0 0 0 ${size * 0.2}px rgba(255,255,255,0.1)
                            `;
                        }
                        obj.style.animationName = 'fallSlow';
                    } else if (type < 0.65) {
                        // Book
                        obj.classList.add('book');
                        obj.textContent = books[Math.floor(Math.random() * books.length)];
                        obj.style.fontSize = `${size}px`;
                        obj.style.animationName = Math.random() > 0.5 ? 'fall' : 'fallFast';
                    } else {
                        // Money / gems
                        obj.classList.add('money-fall');
                        obj.textContent = moneyEmojis[Math.floor(Math.random() * moneyEmojis.length)];
                        obj.style.fontSize = `${size}px`;
                        obj.style.animationName = Math.random() > 0.5 ? 'fallFast' : 'fallSlow';
                    }

                    fragment.appendChild(obj);
                }

                container.appendChild(fragment);
            }

            function createParticles() {
                const container = document.getElementById('particlesContainer');
                if (!container) return;

                const fragment = document.createDocumentFragment();

                for (let i = 0; i < 15; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    const size = 2 + Math.random() * 5;
                    const left = Math.random() * 100;
                    const duration = 5 + Math.random() * 10;
                    const delay = Math.random() * 8;
                    
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${left}%`;
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.animationDelay = `${delay}s`;
                    
                    fragment.appendChild(particle);
                }

                container.appendChild(fragment);
            }

            function createSparkles() {
                const container = document.getElementById('sparklesContainer');
                if (!container) return;

                const fragment = document.createDocumentFragment();

                for (let i = 0; i < 15; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    
                    sparkle.style.left = `${Math.random() * 100}%`;
                    sparkle.style.top = `${Math.random() * 100}%`;
                    sparkle.style.animationDelay = `${Math.random() * 3}s`;
                    sparkle.style.animationDuration = `${2 + Math.random() * 4}s`;
                    
                    fragment.appendChild(sparkle);
                }

                container.appendChild(fragment);
            }

            // =====================
            // UTILITY FUNCTIONS
            // =====================

            function showToast(message, type = 'success') {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            function showLoading(show) {
                const overlay = document.getElementById('loadingOverlay');
                if (show) {
                    overlay.classList.remove('hidden');
                } else {
                    overlay.classList.add('hidden');
                }
            }

            // =====================
            // PAYMENT METHODS
            // =====================

            function initPaymentMethods() {
                const buttons = document.querySelectorAll('.method-btn');
                
                buttons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        buttons.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        selectedMethod = this.dataset.method;
                    });
                });

                // Set default
                const defaultBtn = document.querySelector('.method-btn[data-method="transfer"]');
                if (defaultBtn) defaultBtn.classList.add('active');
            }

            // =====================
            // COPY ACCOUNT
            // =====================

            function copyAccount() {
                const accountNumber = document.getElementById('accountNumber').textContent.trim();
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(accountNumber).then(() => {
                        showCopiedFeedback();
                    }).catch(() => {
                        fallbackCopy(accountNumber);
                    });
                } else {
                    fallbackCopy(accountNumber);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    showCopiedFeedback();
                } catch {
                    showToast('Failed to copy. Please copy manually.', 'error');
                }
                
                document.body.removeChild(textarea);
            }

            function showCopiedFeedback() {
                // Visual feedback on the button
                const copyBtn = document.querySelector('.copy-btn');
                if (copyBtn) {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '✅ Copied!';
                    copyBtn.style.background = 'rgba(34,197,94,0.4)';
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.style.background = 'rgba(255,255,255,0.2)';
                    }, 2000);
                }

                // Highlight account number
                const accountEl = document.getElementById('accountNumber');
                if (accountEl) {
                    accountEl.style.background = 'rgba(34,197,94,0.3)';
                    setTimeout(() => {
                        accountEl.style.background = 'rgba(255,255,255,0.15)';
                    }, 1000);
                }

                showToast('✅ Account number copied!');
            }

            // =====================
            // SUBMIT PAYMENT
            // =====================

            async function submitPayment() {
                const bankName = document.getElementById('bankName').value.trim();
                const reference = document.getElementById('referenceNumber').value.trim();
                const submitBtn = document.getElementById('submitBtn');
                
                // Validation
                if (!bankName) {
                    showToast('❌ Please enter your bank name', 'error');
                    document.getElementById('bankName').focus();
                    return;
                }
                
                if (!reference) {
                    showToast('❌ Please enter transaction reference number', 'error');
                    document.getElementById('referenceNumber').focus();
                    return;
                }

                if (reference.length < 4) {
                    showToast('❌ Please enter a valid reference number', 'error');
                    return;
                }
                
                // Disable button and show loading
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Submitting... <span class="loader"></span>';
                showLoading(true);
                
                try {
                    const res = await fetch(`${API_URL}/submit-payment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ 
                            bankName, 
                            reference, 
                            method: selectedMethod 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        showToast('✅ Payment submitted! Redirecting...', 'success');
                        
                        // Redirect after short delay
                        setTimeout(() => {
                            window.location.href = '/index.html';
                        }, 1500);
                    } else {
                        showToast('❌ ' + (data.error || 'Failed to submit payment'), 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '✅ I HAVE PAID - Submit for Verification';
                        showLoading(false);
                    }
                } catch (err) {
                    showToast('❌ Connection error. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '✅ I HAVE PAID - Submit for Verification';
                    showLoading(false);
                }
            }

            // =====================
            // KEYBOARD SUPPORT
            // =====================

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    submitPayment();
                }
            });

            // =====================
            // EXPOSE FUNCTIONS
            // =====================

            window.copyAccount = copyAccount;
            window.submitPayment = submitPayment;

            // =====================
            // INITIALIZATION
            // =====================

            function init() {
                createFallingObjects();
                createParticles();
                createSparkles();
                initPaymentMethods();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
