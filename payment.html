<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Payment - Chylnx Hub</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;min-height:100vh;padding:20px}
        .container{max-width:500px;margin:0 auto}
        .header{text-align:center;padding:20px 0}
        .logo{font-size:28px;font-weight:800;color:#1f2937}
        .payment-card{background:#fff;border-radius:32px;padding:25px;margin-bottom:20px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}
        .bank-details{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:24px;padding:25px;text-align:center;margin-bottom:20px}
        .bank-name{font-size:20px;font-weight:700;margin-bottom:15px}
        .account-number{font-size:32px;font-weight:800;letter-spacing:3px;background:rgba(255,255,255,.2);padding:12px;border-radius:20px;font-family:monospace;margin:15px 0}
        .copy-btn{background:rgba(255,255,255,.25);border:none;padding:8px 20px;border-radius:50px;color:#fff;font-size:14px;cursor:pointer}
        .amount{font-size:28px;font-weight:800;margin:15px 0}
        .section-title{font-size:18px;font-weight:600;color:#1f2937;margin-bottom:15px}
        .payment-methods{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .method-btn{flex:1;padding:12px;border:2px solid #e5e7eb;background:#fff;border-radius:16px;cursor:pointer;font-weight:500}
        .method-btn.active{border-color:#667eea;background:#f0f0ff;color:#667eea}
        input{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:16px;font-size:16px;margin-bottom:15px;outline:none}
        input:focus{border-color:#667eea}
        .submit-btn{width:100%;background:#10b981;color:#fff;border:none;padding:16px;font-size:18px;font-weight:600;border-radius:50px;cursor:pointer}
        .back-link{display:block;text-align:center;color:#6b7280;text-decoration:none;margin-top:20px}
        .loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;color:#fff;display:none}
    </style>
</head>
<body>
    <div id="loading" class="loading"><div>Submitting... ⏳</div></div>
    
    <div class="container">
        <div class="header"><div class="logo">💎 chylnx hub</div><p style="color:#6b7280">One-time payment for lifetime access</p></div>
        <div class="payment-card">
            <div class="bank-details">
                <div class="bank-name">🏦 GTBank (Nigeria)</div>
                <div class="account-number" id="accountNumber">0123456789</div>
                <button class="copy-btn" onclick="copyAccount()">📋 Copy Account Number</button>
                <div class="amount">₦2,500 ONLY</div>
                <div style="font-size:12px;opacity:.8">Account Name: CHYLNX HUB</div>
            </div>
            <div class="section-title">📝 After payment, confirm below</div>
            <div class="payment-methods">
                <button class="method-btn" data-method="ussd">💳 USSD</button>
                <button class="method-btn" data-method="transfer">🏦 Transfer</button>
                <button class="method-btn" data-method="pos">💻 POS</button>
            </div>
            <input type="text" id="bankName" placeholder="Your Bank Name (e.g., GTBank, UBA, Access)">
            <input type="text" id="referenceNumber" placeholder="Transaction Reference / Teller Number">
            <button class="submit-btn" onclick="submitPayment()">✅ I HAVE PAID - Submit for Verification</button>
        </div>
        <a href="/index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        const API_URL = '/api';
        let selectedMethod = 'transfer';
        
        document.querySelectorAll('.method-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMethod = btn.dataset.method;
            });
        });
        document.querySelector('.method-btn[data-method="transfer"]').classList.add('active');
        
        function copyAccount() {
            navigator.clipboard.writeText(document.getElementById('accountNumber').innerText);
            alert('✅ Account number copied!');
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }
        
        async function submitPayment() {
            const bankName = document.getElementById('bankName').value.trim();
            const reference = document.getElementById('referenceNumber').value.trim();
            
            if (!bankName) { alert('❌ Please enter your bank name'); return; }
            if (!reference) { alert('❌ Please enter transaction reference number'); return; }
            
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/submit-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ bankName, reference, method: selectedMethod })
                });
                if (res.ok) {
                    alert('✅ Payment submitted! Pending admin verification.');
                    window.location.href = '/index.html';
                } else {
                    const data = await res.json();
                    alert('❌ ' + (data.error || 'Failed to submit payment'));
                }
            } catch { alert('❌ Connection error. Please try again.'); }
            finally { showLoading(false); }
        }
    </script>
</body>
</html>
