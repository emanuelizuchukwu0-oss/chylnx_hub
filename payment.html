<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Payment - Chylnx Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #1f2937;
        }

        .payment-card {
            background: white;
            border-radius: 32px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .bank-details {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }

        .bank-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .account-number {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 3px;
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 20px;
            font-family: monospace;
            margin: 15px 0;
        }

        .copy-btn {
            background: rgba(255,255,255,0.25);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .amount {
            font-size: 28px;
            font-weight: 800;
            margin: 15px 0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .method-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .method-btn.active {
            border-color: #667eea;
            background: #f0f0ff;
            color: #667eea;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #059669;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .success-card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
        }

        .back-link {
            display: block;
            text-align: center;
            color: #6b7280;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💎 chylnx hub</div>
            <p style="color: #6b7280;">One-time payment for lifetime access</p>
        </div>

        <div class="payment-card">
            <div class="bank-details">
                <div class="bank-name">🏦 GTBank (Nigeria)</div>
                <div class="account-number" id="accountNumber">0123456789</div>
                <button class="copy-btn" onclick="copyAccount()">📋 Copy Account Number</button>
                <div class="amount">₦2,500 ONLY</div>
                <div style="font-size: 12px; opacity: 0.8;">Account Name: CHYLNX HUB</div>
            </div>

            <div class="section-title">📝 After payment, confirm below</div>

            <div class="payment-methods">
                <button class="method-btn" data-method="ussd">💳 USSD</button>
                <button class="method-btn" data-method="transfer">🏦 Transfer</button>
                <button class="method-btn" data-method="pos">💻 POS</button>
            </div>

            <input type="text" id="bankName" placeholder="Your Bank Name (e.g., GTBank, UBA, Access)">
            <input type="text" id="referenceNumber" placeholder="Transaction Reference / Teller Number">

            <button class="submit-btn" onclick="submitPayment()">✅ I HAVE PAID - Submit for Verification</button>
        </div>

        <a href="/index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // FIXED: Use relative URL for Render
        const API_URL = '/api';
        let selectedMethod = 'transfer';

        document.querySelectorAll('.method-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMethod = btn.dataset.method;
            });
        });
        document.querySelector('.method-btn[data-method="transfer"]').classList.add('active');

        function copyAccount() {
            const accountNum = document.getElementById('accountNumber').innerText;
            navigator.clipboard.writeText(accountNum);
            alert('✅ Account number copied!');
        }

        async function submitPayment() {
            const bankName = document.getElementById('bankName').value.trim();
            const reference = document.getElementById('referenceNumber').value.trim();

            if (!bankName) {
                alert('❌ Please enter your bank name');
                return;
            }
            if (!reference) {
                alert('❌ Please enter transaction reference number');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/submit-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        bankName: bankName,
                        reference: reference,
                        method: selectedMethod
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccessOverlay();
                } else {
                    alert('❌ ' + (data.error || 'Failed to submit payment'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Cannot connect to server. Please try again.');
            }
        }

        function showSuccessOverlay() {
            const overlay = document.createElement('div');
            overlay.className = 'success-overlay';
            overlay.innerHTML = `
                <div class="success-card">
                    <div style="font-size: 64px;">⏳</div>
                    <h3 style="margin: 15px 0;">Payment Submitted!</h3>
                    <p style="color: #6b7280; margin-bottom: 20px;">Your payment is pending admin verification.</p>
                    <button onclick="closeOverlayAndGoHome()" style="background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer;">Return Home</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function closeOverlayAndGoHome() {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
