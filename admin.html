<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Chylnx Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2d2d44;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #667eea;
        }

        .pending-payments, .verified-users {
            background: #2d2d44;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .payment-item, .user-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .payment-details {
            font-size: 14px;
        }

        .verify-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .verify-btn:hover {
            background: #059669;
        }

        .admin-login {
            max-width: 400px;
            margin: 100px auto;
            background: #2d2d44;
            padding: 30px;
            border-radius: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-bottom: 15px;
            background: #1a1a2e;
            color: white;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        .logout-btn {
            background: #ef4444;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const ADMIN_PASSWORD = 'admin123'; // Change this!

        function checkAdmin() {
            const isLoggedIn = sessionStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                renderAdminPanel();
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="admin-login">
                    <h2>Admin Login</h2>
                    <input type="password" id="adminPass" placeholder="Enter Admin Password">
                    <button onclick="login()">Login</button>
                </div>
            `;
        }

        function login() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                renderAdminPanel();
            } else {
                alert('Wrong password');
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_logged_in');
            renderLogin();
        }

        function renderAdminPanel() {
            // Get pending payments
            let pendingPayments = JSON.parse(localStorage.getItem('chylnx_pending_payments') || '[]');
            let users = JSON.parse(localStorage.getItem('chylnx_users') || '{}');
            
            // Count verified users
            let verifiedCount = 0;
            for (let email in users) {
                if (users[email].paymentVerified === true) verifiedCount++;
            }
            
            const pendingHtml = pendingPayments.map((payment, index) => `
                <div class="payment-item">
                    <div class="payment-details">
                        <strong>${payment.email}</strong><br>
                        Bank: ${payment.bankName}<br>
                        Ref: ${payment.reference}<br>
                        Method: ${payment.method}<br>
                        Amount: ₦${payment.amount}<br>
                        Time: ${new Date(payment.timestamp).toLocaleString()}
                    </div>
                    <button class="verify-btn" onclick="verifyPayment(${index})">✅ Verify & Grant Access</button>
                </div>
            `).join('');
            
            const usersHtml = Object.values(users).map(user => `
                <div class="user-item">
                    <span>${user.email}</span>
                    <span style="color: ${user.paymentVerified ? '#10b981' : '#f59e0b'}">
                        ${user.paymentVerified ? '✅ Verified' : '⏳ Pending'}
                    </span>
                </div>
            `).join('');
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <h1>🔐 Chylnx Hub Admin Panel</h1>
                    
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-number">${pendingPayments.length}</div>
                            <div>Pending Payments</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${verifiedCount}</div>
                            <div>Verified Users</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${Object.keys(users).length}</div>
                            <div>Total Users</div>
                        </div>
                    </div>
                    
                    <div class="pending-payments">
                        <h2>⏳ Pending Payment Verifications</h2>
                        ${pendingPayments.length === 0 ? '<p style="color: #888;">No pending payments</p>' : pendingHtml}
                    </div>
                    
                    <div class="verified-users">
                        <h2>👥 Users List</h2>
                        ${usersHtml}
                    </div>
                    
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            `;
        }

        function verifyPayment(index) {
            let pendingPayments = JSON.parse(localStorage.getItem('chylnx_pending_payments') || '[]');
            let users = JSON.parse(localStorage.getItem('chylnx_users') || '{}');
            
            const payment = pendingPayments[index];
            if (payment && users[payment.email]) {
                // Verify the user
                users[payment.email].paymentVerified = true;
                localStorage.setItem('chylnx_users', JSON.stringify(users));
                
                // Remove from pending
                pendingPayments.splice(index, 1);
                localStorage.setItem('chylnx_pending_payments', JSON.stringify(pendingPayments));
                
                // Also update current session if same user
                const currentUser = JSON.parse(localStorage.getItem('chylnx_user'));
                if (currentUser && currentUser.email === payment.email) {
                    currentUser.paymentVerified = true;
                    localStorage.setItem('chylnx_user', JSON.stringify(currentUser));
                }
                
                alert(`✅ Verified ${payment.email}! They can now access the chat.`);
                renderAdminPanel();
            }
        }

        checkAdmin();
    </script>
</body>
</html>
