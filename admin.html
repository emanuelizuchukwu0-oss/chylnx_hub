<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Chylnx Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a2e;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            font-size: clamp(20px, 4vw, 28px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2d2d44;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pending-payments, .verified-users {
            background: #2d2d44;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .payment-item, .user-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: background 0.2s ease;
        }

        .payment-item:hover, .user-item:hover {
            background: #232338;
        }

        .payment-details {
            font-size: 14px;
            flex: 1;
            min-width: 200px;
        }

        .payment-details strong {
            color: #667eea;
        }

        .verify-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .verify-btn:hover {
            background: #059669;
            transform: scale(1.02);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .admin-login {
            max-width: 400px;
            margin: 100px auto;
            background: #2d2d44;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .admin-login h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            margin-bottom: 15px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
            transition: border-color 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        input::placeholder {
            color: #666;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .logout-btn {
            background: #ef4444;
            margin-top: 20px;
            width: auto;
            padding: 10px 24px;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .error-msg {
            background: #ef4444;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
            animation: shake 0.3s ease;
        }

        .success-msg {
            background: #10b981;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-verified {
            background: #10b981;
            color: white;
        }

        .badge-pending {
            background: #f59e0b;
            color: #000;
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 30px;
            font-size: 15px;
        }

        .empty-state-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        .last-login {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .refresh-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .refresh-btn {
            background: #2d2d44;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: #3d3d54;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .admin-login {
                margin: 50px auto;
                padding: 20px;
            }
            
            .payment-item, .user-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .verify-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            'use strict';

            // ⚠️ IMPORTANT: In production, NEVER hardcode passwords in client-side code!
            // This should be replaced with proper server-side authentication
            // For now, using a one-way hash comparison for slightly better security
            const ADMIN_PASSWORD_HASH = null; // Will be set after first login
            const STORAGE_KEYS = {
                AUTH: 'admin_auth_token',
                SESSION: 'admin_session',
                PAYMENTS: 'chylnx_pending_payments',
                USERS: 'chylnx_users',
                CURRENT_USER: 'chylnx_user'
            };

            // Simple hash function (NOT cryptographically secure - use server-side hashing in production!)
            async function simpleHash(str) {
                const encoder = new TextEncoder();
                const data = encoder.encode(str);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            // Session management with expiry
            function setSession(token) {
                const session = {
                    token: token,
                    timestamp: Date.now(),
                    expiry: Date.now() + (24 * 60 * 60 * 1000) // 24 hours
                };
                sessionStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify(session));
            }

            function getSession() {
                try {
                    const sessionData = sessionStorage.getItem(STORAGE_KEYS.SESSION);
                    if (!sessionData) return null;
                    
                    const session = JSON.parse(sessionData);
                    
                    // Check expiry
                    if (Date.now() > session.expiry) {
                        sessionStorage.removeItem(STORAGE_KEYS.SESSION);
                        return null;
                    }
                    
                    return session;
                } catch (error) {
                    console.error('Session parsing error:', error);
                    return null;
                }
            }

            function clearSession() {
                sessionStorage.removeItem(STORAGE_KEYS.SESSION);
            }

            // Rate limiting for login attempts
            let loginAttempts = 0;
            let loginBlockedUntil = null;
            const MAX_LOGIN_ATTEMPTS = 5;
            const BLOCK_DURATION = 15 * 60 * 1000; // 15 minutes

            function isLoginBlocked() {
                if (loginBlockedUntil && Date.now() < loginBlockedUntil) {
                    const minutesLeft = Math.ceil((loginBlockedUntil - Date.now()) / 60000);
                    return `Too many attempts. Please wait ${minutesLeft} minute(s).`;
                }
                if (loginBlockedUntil && Date.now() >= loginBlockedUntil) {
                    loginBlockedUntil = null;
                    loginAttempts = 0;
                }
                return false;
            }

            // DOM helper
            function $(selector) {
                return document.querySelector(selector);
            }

            function $$(selector) {
                return document.querySelectorAll(selector);
            }

            // Toast notification
            function showToast(message, type = 'success', duration = 3000) {
                const existingToast = $('.toast-notification');
                if (existingToast) existingToast.remove();
                
                const toast = document.createElement('div');
                toast.className = 'toast-notification';
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    z-index: 9999;
                    background: ${type === 'error' ? '#ef4444' : '#10b981'};
                    color: white;
                    padding: 12px 20px;
                    border-radius: 8px;
                    font-weight: 500;
                    animation: fadeIn 0.3s ease;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    max-width: 350px;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }

            // Safe localStorage operations
            function safeGetItem(key, defaultValue = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (error) {
                    console.error(`Error reading ${key} from localStorage:`, error);
                    return defaultValue;
                }
            }

            function safeSetItem(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch (error) {
                    console.error(`Error writing to localStorage:`, error);
                    showToast('Storage full. Please clear some data.', 'error');
                    return false;
                }
            }

            // Main authentication check
            function checkAdmin() {
                // Check for hash in URL (for password setup) - remove immediately
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('setup')) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                
                const session = getSession();
                if (session && session.token) {
                    renderAdminPanel();
                } else {
                    renderLogin();
                }
            }

            function renderLogin() {
                const blockMessage = isLoginBlocked();
                
                document.getElementById('app').innerHTML = `
                    <div class="admin-login">
                        <h2>🔐 Admin Login</h2>
                        ${blockMessage ? `<div class="error-msg" style="display: block;">⏰ ${blockMessage}</div>` : ''}
                        <div class="error-msg" id="loginError"></div>
                        <div class="input-group">
                            <input type="password" id="adminPass" placeholder="Enter Admin Password" 
                                   autocomplete="current-password" ${blockMessage ? 'disabled' : ''}>
                        </div>
                        <button class="btn" id="loginBtn" onclick="window._adminLogin()" ${blockMessage ? 'disabled' : ''}>
                            Login
                        </button>
                        <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #888;">
                            Default password: admin123<br>
                            <span style="color: #ef4444;">⚠️ Change immediately in production!</span>
                        </p>
                    </div>
                `;

                // Add Enter key support
                const input = document.getElementById('adminPass');
                if (input) {
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            window._adminLogin();
                        }
                    });
                    // Auto-focus
                    setTimeout(() => input.focus(), 100);
                }
            }

            // Expose login function globally for inline onclick
            window._adminLogin = async function() {
                const blockMessage = isLoginBlocked();
                if (blockMessage) {
                    showLoginError(blockMessage);
                    return;
                }

                const passwordInput = document.getElementById('adminPass');
                const loginBtn = document.getElementById('loginBtn');
                
                if (!passwordInput || !loginBtn) return;
                
                const password = passwordInput.value;
                
                if (!password) {
                    showLoginError('Please enter a password');
                    passwordInput.focus();
                    return;
                }

                // Disable button during processing
                loginBtn.disabled = true;
                loginBtn.textContent = 'Verifying...';
                
                try {
                    // Simple password check (REPLACE with server-side authentication!)
                    const correctPassword = 'admin123'; // Change this!
                    
                    // Add small delay to prevent brute force
                    await new Promise(resolve => setTimeout(resolve, 300));
                    
                    if (password === correctPassword) {
                        // Reset attempts on success
                        loginAttempts = 0;
                        loginBlockedUntil = null;
                        
                        // Generate session token
                        const token = await simpleHash(password + Date.now());
                        setSession(token);
                        
                        showToast('✅ Login successful!');
                        renderAdminPanel();
                    } else {
                        loginAttempts++;
                        
                        if (loginAttempts >= MAX_LOGIN_ATTEMPTS) {
                            loginBlockedUntil = Date.now() + BLOCK_DURATION;
                            showLoginError(`Too many failed attempts. Blocked for 15 minutes.`);
                            renderLogin();
                        } else {
                            const remaining = MAX_LOGIN_ATTEMPTS - loginAttempts;
                            showLoginError(`Incorrect password. ${remaining} attempt(s) remaining.`);
                        }
                        
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showLoginError('An error occurred. Please try again.');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            };

            function showLoginError(message) {
                const errorDiv = document.getElementById('loginError');
                if (errorDiv) {
                    errorDiv.textContent = message;
                    errorDiv.style.display = 'block';
                    
                    // Shake animation
                    errorDiv.style.animation = 'none';
                    errorDiv.offsetHeight; // Trigger reflow
                    errorDiv.style.animation = 'shake 0.3s ease';
                }
            }

            function logout() {
                if (confirm('Are you sure you want to log out?')) {
                    clearSession();
                    showToast('Logged out successfully');
                    renderLogin();
                }
            }

            function refreshData() {
                const refreshBtn = $('.refresh-btn');
                if (refreshBtn) {
                    refreshBtn.disabled = true;
                    refreshBtn.textContent = '🔄 Refreshing...';
                }
                
                // Small delay for UX
                setTimeout(() => {
                    renderAdminPanel();
                    showToast('✅ Data refreshed!');
                    
                    if (refreshBtn) {
                        refreshBtn.disabled = false;
                        refreshBtn.textContent = '🔄 Refresh Data';
                    }
                }, 300);
            }

            function renderAdminPanel() {
                const pendingPayments = safeGetItem(STORAGE_KEYS.PAYMENTS, []);
                const users = safeGetItem(STORAGE_KEYS.USERS, {});
                
                // Validate data
                if (!Array.isArray(pendingPayments)) {
                    console.error('Invalid pending payments data');
                    safeSetItem(STORAGE_KEYS.PAYMENTS, []);
                }
                
                // Count verified users
                let verifiedCount = 0;
                const usersArray = typeof users === 'object' && users !== null ? Object.values(users) : [];
                
                usersArray.forEach(user => {
                    if (user && user.paymentVerified === true) verifiedCount++;
                });
                
                // Build pending payments HTML
                const pendingHtml = pendingPayments.length > 0 
                    ? pendingPayments.map((payment, index) => {
                        if (!payment || !payment.email) return '';
                        
                        const timestamp = payment.timestamp 
                            ? new Date(payment.timestamp).toLocaleString() 
                            : 'Unknown';
                        
                        return `
                            <div class="payment-item">
                                <div class="payment-details">
                                    <strong>📧 ${escapeHtml(payment.email)}</strong><br>
                                    🏦 Bank: ${escapeHtml(payment.bankName || 'N/A')}<br>
                                    🆔 Ref: ${escapeHtml(payment.reference || 'N/A')}<br>
                                    💳 Method: ${escapeHtml(payment.method || 'N/A')}<br>
                                    💰 Amount: ₦${escapeHtml(payment.amount || '0')}<br>
                                    🕐 Time: ${escapeHtml(timestamp)}
                                </div>
                                <button class="verify-btn" data-index="${index}" 
                                        onclick="window._verifyPayment(${index}, this)">
                                    ✅ Verify & Grant Access
                                </button>
                            </div>
                        `;
                    }).join('')
                    : '<div class="empty-state"><span class="empty-state-icon">✅</span>No pending payments</div>';
                
                // Build users HTML
                const usersHtml = usersArray.length > 0
                    ? usersArray.map(user => {
                        if (!user || !user.email) return '';
                        
                        const isVerified = user.paymentVerified === true;
                        return `
                            <div class="user-item">
                                <span>📧 ${escapeHtml(user.email)}</span>
                                <span class="badge ${isVerified ? 'badge-verified' : 'badge-pending'}">
                                    ${isVerified ? '✅ Verified' : '⏳ Pending'}
                                </span>
                            </div>
                        `;
                    }).join('')
                    : '<div class="empty-state"><span class="empty-state-icon">👥</span>No users registered yet</div>';
                
                // Get session info
                const session = getSession();
                const loginTime = session?.timestamp 
                    ? new Date(session.timestamp).toLocaleString() 
                    : 'Unknown';
                
                document.getElementById('app').innerHTML = `
                    <div class="container">
                        <h1>🔐 Chylnx Hub Admin Panel</h1>
                        
                        <div class="refresh-bar">
                            <span class="last-login">Last login: ${loginTime}</span>
                            <button class="refresh-btn" onclick="window._refreshData()">🔄 Refresh Data</button>
                        </div>
                        
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-number">${pendingPayments.length}</div>
                                <div>Pending Payments</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${verifiedCount}</div>
                                <div>Verified Users</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${usersArray.length}</div>
                                <div>Total Users</div>
                            </div>
                        </div>
                        
                        <div class="pending-payments">
                            <h2>⏳ Pending Payment Verifications</h2>
                            ${pendingHtml}
                        </div>
                        
                        <div class="verified-users">
                            <h2>👥 Users List</h2>
                            ${usersHtml}
                        </div>
                        
                        <button class="btn logout-btn" onclick="window._logout()">🚪 Logout</button>
                    </div>
                `;
            }

            function escapeHtml(text) {
                if (!text && text !== 0) return '';
                const div = document.createElement('div');
                div.textContent = String(text);
                return div.innerHTML;
            }

            // Expose functions globally
            window._verifyPayment = function(index, btnElement) {
                if (btnElement) {
                    btnElement.disabled = true;
                    btnElement.textContent = '⏳ Verifying...';
                }
                
                try {
                    const pendingPayments = safeGetItem(STORAGE_KEYS.PAYMENTS, []);
                    const users = safeGetItem(STORAGE_KEYS.USERS, {});
                    
                    if (!Array.isArray(pendingPayments) || index < 0 || index >= pendingPayments.length) {
                        throw new Error('Invalid payment index');
                    }
                    
                    const payment = pendingPayments[index];
                    
                    if (!payment || !payment.email) {
                        throw new Error('Invalid payment data');
                    }
                    
                    if (!users[payment.email]) {
                        throw new Error('User not found');
                    }
                    
                    // Verify the user
                    users[payment.email].paymentVerified = true;
                    users[payment.email].verifiedAt = Date.now();
                    
                    if (!safeSetItem(STORAGE_KEYS.USERS, users)) {
                        throw new Error('Failed to save user data');
                    }
                    
                    // Remove from pending
                    pendingPayments.splice(index, 1);
                    
                    if (!safeSetItem(STORAGE_KEYS.PAYMENTS, pendingPayments)) {
                        // Rollback user verification if payment removal fails
                        users[payment.email].paymentVerified = false;
                        delete users[payment.email].verifiedAt;
                        safeSetItem(STORAGE_KEYS.USERS, users);
                        throw new Error('Failed to update payments');
                    }
                    
                    // Update current session if same user
                    const currentUser = safeGetItem(STORAGE_KEYS.CURRENT_USER);
                    if (currentUser && currentUser.email === payment.email) {
                        currentUser.paymentVerified = true;
                        safeSetItem(STORAGE_KEYS.CURRENT_USER, currentUser);
                    }
                    
                    showToast(`✅ Verified ${payment.email}! They can now access the chat.`);
                    
                    // Re-render panel
                    setTimeout(() => renderAdminPanel(), 500);
                    
                } catch (error) {
                    console.error('Verification error:', error);
                    showToast(`❌ ${error.message || 'Failed to verify payment'}`, 'error');
                    
                    if (btnElement) {
                        btnElement.disabled = false;
                        btnElement.textContent = '✅ Verify & Grant Access';
                    }
                }
            };

            window._logout = logout;
            window._refreshData = refreshData;

            // Handle storage events (if multiple tabs are open)
            window.addEventListener('storage', function(e) {
                if (e.key === STORAGE_KEYS.PAYMENTS || e.key === STORAGE_KEYS.USERS) {
                    const session = getSession();
                    if (session) {
                        renderAdminPanel();
                    }
                }
            });

            // Handle page visibility changes
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    const session = getSession();
                    if (session) {
                        // Refresh data when tab becomes visible
                        renderAdminPanel();
                    }
                }
            });

            // Initialize
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', checkAdmin);
            } else {
                checkAdmin();
            }
        })();
    </script>
</body>
</html>
